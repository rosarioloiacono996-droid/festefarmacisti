            --card-bg: #141B18;
            --accent-green: #004D40;
            --bright-mint: #00E676;
            --text-main: #E0E6E3;

        body {

            height: 100dvh;

            flex-direction: column;

        .nav-item {

            color: var(--text-dim);
            text-decoration: none;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 4px;
            transition: all 0.2s;
        }

        .nav-item:hover,
        .nav-item.active {
            background: var(--accent-green);
            color: white;
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
            margin-right: 8px;
        }

        /* Content Area */
        .content {
            flex-grow: 1;
            padding: 12px 16px;
            overflow-y: auto;
            position: relative;
        }

        /* Dashboard specific - Above the fold constraint */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .dashboard-card-span-2 {
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            .dashboard-card-span-2 {
                grid-column: span 1;
            }
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-family: var(--font-title);
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .big-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--bright-mint);
            line-height: 1;
        }

        .progress-container {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--bright-mint);
            transition: width 0.3s;
        }

        /* Tables - Information Density */
        .compact-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .compact-table th {
            text-align: left;
            padding: 6px 8px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);

        .sortable-header {

            transition: all 0.2s;

        .sortable-header:hover {

        .status-card-hover:hover {

            align-items: center;
            justify-content: center;

            line-height: 1;

            .content {

                padding-bottom: 24px;

            .dashboard-grid {

                grid-template-rows: auto;
                height: auto;
                gap: 16px;

            .grid-compact {
                grid-template-columns: 1fr;
            }

            .roadmap-container {

                gap: 24px;

            .milestones-card {

                position: static;
                order: -1;
                /* Show milestones at top on mobile? Or bottom? Let's go bottom for better flow. Actually order: 2 */
                order: 2;
            }

            .compact-table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin: 0 -12px;
                padding: 0 12px;
            }

            .mobile-view {
                display: block !important;
            }

            .desktop-view {
                display: none !important;
            }

            .compact-table {
                min-width: 600px;
                /* Force scroll for tables */
            }

            .modal {
                width: 95vw;
                padding: 12px;
            }

            .big-number {
                font-size: 24px;
            }

            .card-title {
                font-size: 10px;
            }

            /* Improve touch targets (Apple/Google min 44px) */
            .btn,
            .nav-item {
                min-height: 44px;
            }

            input,
            select,
            textarea {
                min-height: 44px;
                padding: 10px 8px;
                font-size: 16px;
                /* Prevents iOS auto-zoom on focus */
            }

            .compact-table td {
                padding: 10px 8px;
            }
        }

        /* Mobile-only expanded fields — hidden on desktop */
        .expanded-mobile-only {
            display: none;
        }

        @media (max-width: 768px) {

            /* Nascondi colonne Adesioni e Follow-up: appaiono solo nel pannello espanso */
            .compact-table th:nth-child(6),
            .compact-table td:nth-child(6),
            .compact-table th:nth-child(7),
            .compact-table td:nth-child(7) {
                display: none;
            }

            .expanded-mobile-only {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .compact-table {
                font-size: 11px;
            }
        }

        .milestone-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .milestone-label {
            font-size: 12px;
            color: var(--text-dim);
        }

        .milestone-value {
            font-family: var(--font-title);
            font-size: 32px;
            font-weight: 800;
        }

        .v-50 {
            color: #FFA000;
        }

        .v-100 {
            color: #00B0FF;
        }

        .v-200 {
            color: #00E676;
        }
    </style>
</head>

        // --- COMPONENTS ---

        const ConfirmModal = ({ message, onConfirm, onCancel }) => (
            <div className="modal-overlay" onClick={onCancel}>
                <div className="modal" onClick={(e) => e.stopPropagation()}>
                    <p style={{ marginBottom: '16px', color: 'var(--text-main)', fontSize: '13px', lineHeight: '1.5' }}>{message}</p>
                    <div style={{ display: 'flex', gap: '8px', justifyContent: 'flex-end' }}>

                        <button className="btn" style={{ background: '#FF5252', color: 'white' }} onClick={onConfirm}>Elimina</button>

        const InlineEdit = ({ value, onSave, type = "text", options = null, isExpanded = true }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [currentValue, setCurrentValue] = useState(value);

            const handleSave = () => {
                onSave(currentValue);
                setIsEditing(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') handleSave();
                if (e.key === 'Escape') {
                    setCurrentValue(value);
                    setIsEditing(false);
                }
            };

            if (isEditing) {
                if (type === "select" && options) {
                    return (
                        <select
                            value={currentValue}
                            onChange={(e) => { setCurrentValue(e.target.value); onSave(e.target.value); setIsEditing(false); }}
                            onBlur={() => setIsEditing(false)}
                            autoFocus
                            style={{ padding: '2px', fontSize: '11px', width: 'auto' }}
                        >
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                    );
                }
                return (
                    <input
                        type={type}
                        value={currentValue}
                        onChange={(e) => setCurrentValue(e.target.value)}
                        onBlur={handleSave}
                        onKeyDown={handleKeyDown}
                        autoFocus
                        style={{ padding: '2px', fontSize: '11px', width: 'auto', background: '#1D2622', border: '1px solid var(--bright-mint)' }}
                    />
                );
            }

            return (
                <span
                    onClick={(e) => {
                        if (isExpanded) {
                            e.stopPropagation();
                            setIsEditing(true);
                        }
                    }}
                    style={{ cursor: isExpanded ? 'pointer' : 'default', borderBottom: isExpanded ? '1px dashed rgba(0, 230, 118, 0.3)' : 'none' }}
                    title={isExpanded ? "Clicca per modificare" : ""}
                >
                    {value || '---'}
                </span>
            );
        };

        const Dashboard = ({ farmacieStats = { total: 0, conosciute: 0 }, sede, sponsors, setActiveTab, setStatusFilter, partecipanti = [] }) => {
            const confirmedPharmacists = Array.isArray(partecipanti) ? partecipanti.reduce((acc, p) =>
                acc + (p?.ruolo === 'Farmacista' ? 1 : 0) + (parseInt(p?.colleghi_farmacisti) || 0), 0) : 0;

            const extraParticipants = Array.isArray(partecipanti) ? partecipanti.reduce((acc, p) =>
                acc + (p?.ruolo === 'Accompagnatore' ? 1 : 0) + (parseInt(p?.accompagnatori) || 0), 0) : 0;

            const totalParticipants = confirmedPharmacists + extraParticipants;
            const goal = 200;
            const progress = (totalParticipants / goal) * 100;

            const totalSponsorship = sponsors.reduce((acc, curr) => acc + (parseInt(curr.importo) || 0), 0);
            const costoPersona = sede?.costo_persona || 0;
            const totalCosto = totalParticipants * costoPersona;
            const costRemaining = Math.max(0, totalCosto - totalSponsorship);
            const suggestedTicketPrice = totalParticipants > 0 ? Math.ceil(costRemaining / totalParticipants) : costoPersona;

            const financialBalance = (totalParticipants * costoPersona + totalSponsorship) - totalCosto;

            const missingToNext = totalParticipants < 50 ? 50 - totalParticipants :
                totalParticipants < 100 ? 100 - totalParticipants :
                    totalParticipants < 200 ? 200 - totalParticipants : 0;

            const handleStatusClick = (status) => {
                setStatusFilter(status);
                setActiveTab('crm');
            };

            return (
                <div className="dashboard-grid fade-in">
                    {/* TITOLO EVENTO */}
                    <div style={{ gridColumn: 'span 3', textAlign: 'center', padding: '16px 0 8px' }}>
                        <div style={{ fontSize: '26px', fontWeight: '800', letterSpacing: '1px', color: 'var(--bright-mint)' }}>Festa Fancazzisti</div>
                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' }}>Clicca su una scheda per accedere alla sezione</div>
                    </div>

                    {/* SECTION 1: METRICHE CHIAVE — colori distinti per gerarchia */}
                    <div style={{ gridColumn: 'span 3', display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(260px, 1fr))', gap: '12px' }}>

                        {/* PARTECIPANTI → tab partecipanti — accent BLU */}
                        <div
                            className="card"
                            onClick={() => setActiveTab('partecipanti')}
                            style={{ cursor: 'pointer', borderLeft: '4px solid #00B0FF', background: 'linear-gradient(135deg, #0D1820 0%, var(--card-bg) 60%)' }}
                        >
                            <div className="card-title" style={{ display: 'flex', alignItems: 'center', gap: '6px', color: '#00B0FF' }}>
                                <i data-lucide="users" style={{ width: '14px' }}></i> Partecipanti
                                <span style={{ marginLeft: 'auto', fontSize: '10px', color: '#00B0FF', fontWeight: '600', textDecoration: 'underline' }}>Clicca qui per lista →</span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'baseline', gap: '8px', marginBottom: '8px' }}>
                                <div className="big-number" style={{ color: '#00B0FF' }}>{totalParticipants}</div>
                                <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>su {goal}</div>
                            </div>
                            <div className="progress-container" style={{ marginBottom: '8px' }}>
                                <div className="progress-bar" style={{ width: `${Math.min(progress, 100)}%`, background: '#00B0FF' }}></div>
                            </div>
                            <div style={{ fontSize: '10px', color: 'var(--text-dim)', display: 'flex', justifyContent: 'space-between' }}>
                                <span>{confirmedPharmacists} Farmacisti</span>
                                <span>{extraParticipants} Accompagnatori</span>
                            </div>
                        </div>

                        {/* FINANZA → tab sponsors — accent AMBRA */}
                        <div
                            className="card"
                            onClick={() => setActiveTab('sponsors')}
                            style={{ cursor: 'pointer', borderLeft: '4px solid #FFD740', background: 'linear-gradient(135deg, #1A1500 0%, var(--card-bg) 60%)' }}
                        >
                            <div className="card-title" style={{ display: 'flex', alignItems: 'center', gap: '6px', color: '#FFD740' }}>
                                <i data-lucide="euro" style={{ width: '14px' }}></i> Obiettivo Pareggio
                                <span style={{ marginLeft: 'auto', fontSize: '10px', color: '#FFD740', fontWeight: '600', textDecoration: 'underline' }}>Clicca qui per sponsor →</span>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px', fontSize: '11px', marginBottom: '10px' }}>
                                <span style={{ color: 'var(--text-dim)' }}>Sponsor raccolti:</span>
                                <span style={{ textAlign: 'right' }}>€{totalSponsorship}</span>
                                <span style={{ color: '#FFD740', fontWeight: 'bold' }}>Ancora da coprire:</span>
                                <span style={{ textAlign: 'right', color: '#FFD740', fontWeight: 'bold' }}>€{costRemaining}</span>
                            </div>
                            <div style={{ borderTop: '1px solid var(--border)', paddingTop: '8px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <span style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Quota suggerita/persona:</span>
                                <span style={{ color: '#FFD740', fontWeight: 'bold', fontSize: '18px' }}>€{suggestedTicketPrice}</span>
                            </div>
                        </div>

                        {/* COPERTURA CRM → tab crm — accent VERDE */}
                        <div
                            className="card"
                            onClick={() => setActiveTab('crm')}
                            style={{ cursor: 'pointer', borderLeft: '4px solid var(--bright-mint)', background: 'linear-gradient(135deg, #071410 0%, var(--card-bg) 60%)' }}
                        >
                            <div className="card-title" style={{ display: 'flex', alignItems: 'center', gap: '6px', color: 'var(--bright-mint)' }}>
                                <i data-lucide="building-2" style={{ width: '14px' }}></i> Copertura CRM
                                <span style={{ marginLeft: 'auto', fontSize: '10px', color: 'var(--bright-mint)', fontWeight: '600', textDecoration: 'underline' }}>Clicca qui per farmacie →</span>
                            </div>
                            <div style={{ display: 'flex', alignItems: 'baseline', gap: '8px', marginBottom: '8px' }}>
                                <div className="big-number">{farmacieStats.conosciute}</div>
                                <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>su {farmacieStats.total}</div>
                            </div>
                            <div className="progress-container" style={{ marginBottom: '8px' }}>
                                <div className="progress-bar" style={{ width: `${farmacieStats.total > 0 ? (farmacieStats.conosciute / farmacieStats.total) * 100 : 0}%` }}></div>
                            </div>
                            <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>
                                {farmacieStats.total - farmacieStats.conosciute} farmacie ancora da mappare
                            </div>
                        </div>
                    </div>

                </div>
            );
        };




        const PAGE_SIZE = 50;

        const CRM = ({ supabaseClient, statusFilter, setStatusFilter, onStatsChange }) => {
            const [farmacie, setFarmacie] = useState([]);
            const [totalCount, setTotalCount] = useState(0);
            const [loadingPage, setLoadingPage] = useState(false);
            const [expandedId, setExpandedId] = useState(null);
            const [filter, setFilter] = useState('');
            const [debouncedFilter, setDebouncedFilter] = useState('');
            const [flagFilter, setFlagFilter] = useState('tutti');
            const [detailModalId, setDetailModalId] = useState(null);
            const [sortConfig, setSortConfig] = useState({ key: 'nome', direction: 'asc' });
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [confirm, setConfirm] = useState(null);
            const [page, setPage] = useState(0);

            useEffect(() => {
                const t = setTimeout(() => { setDebouncedFilter(filter); setPage(0); }, 300);
                return () => clearTimeout(t);
            }, [filter]);

            useEffect(() => { setPage(0); }, [statusFilter, flagFilter, sortConfig]);

            const loadPage = useCallback(async () => {
                if (!supabaseClient) return;
                setLoadingPage(true);
                try {
                    let q = supabaseClient.from('farmacie').select('*', { count: 'exact' });
                    if (debouncedFilter) q = q.or(`nome.ilike.%${debouncedFilter}%,citta.ilike.%${debouncedFilter}%,provincia.ilike.%${debouncedFilter}%`);
                    if (statusFilter !== 'Tutti') q = q.eq('stato', statusFilter);
                    if (flagFilter === 'con') q = q.eq('conosciuto', true);
                    else if (flagFilter === 'senza') q = q.eq('conosciuto', false);
                    const col = sortConfig.key === 'adesioni' ? 'farmacisti_vengono' : sortConfig.key;
                    q = q.order(col, { ascending: sortConfig.direction === 'asc' })
                         .range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1);
                    const { data, error, count } = await q;
                    if (error) throw error;
                    setFarmacie(data || []);
                    setTotalCount(count || 0);
                } catch(e) { console.error('CRM load:', e); }
                setLoadingPage(false);
            }, [supabaseClient, debouncedFilter, statusFilter, flagFilter, sortConfig, page]);

            useEffect(() => { loadPage(); }, [loadPage]);

            const totalPages = Math.ceil(totalCount / PAGE_SIZE);

            const updateFarmacia = useCallback(async (id, field, newValue) => {
                if (!supabaseClient) return;
                const patch = { [field]: newValue };
                if (field === 'indirizzo' && newValue) {
                    const current = farmacie.find(f => f.id === id);
                    if (current && current.note) {
                        const cleanAddr = newValue.toLowerCase().trim();
                        patch.note = current.note.split('\n')
                            .filter(l => !l.toLowerCase().includes(cleanAddr) && !l.toLowerCase().includes('indirizzo:'))
                            .join('\n').trim();
                    }
                }
                await supabaseClient.from('farmacie').update(patch).eq('id', id);
                loadPage();
                if (field === 'conosciuto' && onStatsChange) onStatsChange();
            }, [supabaseClient, farmacie, loadPage, onStatsChange]);

            const deleteFarmacia = useCallback((id) => {
                setConfirm({
                    message: "Sei sicuro di voler eliminare questa farmacia?",
                    onConfirm: async () => {
                        await supabaseClient.from('farmacie').delete().eq('id', id);
                        setConfirm(null);
                        loadPage();
                        if (onStatsChange) onStatsChange();
                    }
                });
            }, [supabaseClient, loadPage, onStatsChange]);

            const addFarmacia = useCallback(async (newFarmacia) => {
                const rec = { ...newFarmacia, id: Date.now(), conosciuto: true, stato: 'Da contattare', farmacisti_vengono: 0, extra_nonfarmacisti: 0, follow_up: new Date().toISOString().split('T')[0], gestore: '', indirizzo: '' };
                await supabaseClient.from('farmacie').insert(rec);
                setIsModalOpen(false);
                loadPage();
                if (onStatsChange) onStatsChange();
            }, [supabaseClient, loadPage, onStatsChange]);

            const requestSort = useCallback((key) => {
                setSortConfig(prev => ({ key, direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc' }));
            }, []);

            const paginatedRows = farmacie;

            return (
                <div className="fade-in">
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', background: '#111915', padding: '12px', borderRadius: '8px' }}>
                        <div style={{ flexGrow: 1 }}>
                            <label style={{ fontSize: '10px', display: 'block', marginBottom: '4px', color: 'var(--text-dim)' }}>Cerca farmacia o città</label>
                            <input
                                placeholder="Cerca..."
                                value={filter}
                                onChange={e => setFilter(e.target.value)}
                                style={{ width: '100%' }}
                            />
                        </div>
                        <div style={{ width: '150px' }}>
                            <label style={{ fontSize: '10px', display: 'block', marginBottom: '4px', color: 'var(--text-dim)' }}>Stato</label>
                            <select
                                value={statusFilter}
                                onChange={e => setStatusFilter(e.target.value)}
                                style={{ width: '100%' }}
                            >
                                <option>Tutti</option>
                                <option>Da contattare</option>
                                <option>Contattato</option>
                                <option>Interessato</option>
                                <option>Confermato</option>
                                <option>Follow-up</option>
                                <option>Non interessato</option>
                            </select>
                        </div>
                        <div style={{ width: '120px' }}>
                            <label style={{ fontSize: '10px', display: 'block', marginBottom: '4px', color: 'var(--text-dim)' }}>Conosci?</label>
                            <select value={flagFilter} onChange={e => setFlagFilter(e.target.value)} style={{ width: '100%' }}>
                                <option value="tutti">Tutte</option>
                                <option value="con">✓ Conosciute</option>
                                <option value="senza">— Da mappare</option>
                            </select>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'flex-end' }}>
                            <button className="btn btn-primary" onClick={() => setIsModalOpen(true)}>+ Nuova</button>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <div className="card-title">Nuova Farmacia</div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    addFarmacia(Object.fromEntries(fd));
                                }}>
                                    <div className="input-group"><label>Nome</label><input name="nome" required /></div>
                                    <div className="input-group"><label>Città</label><input name="citta" required /></div>
                                    <div className="input-group"><label>Provincia (es. MI)</label><input name="provincia" maxLength="2" required /></div>
                                    <div className="input-group"><label>Referente</label><input name="referente" /></div>
                                    <div className="input-group"><label>Telefono</label><input name="telefono" /></div>
                                    <div className="input-group"><label>Tot Collaboratori</label><input name="collaboratori_totali" type="number" defaultValue="0" /></div>
                                    <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                                        <button type="submit" className="btn btn-primary">Salva</button>
                                        <button type="button" className="btn btn-outline" onClick={() => setIsModalOpen(false)}>Annulla</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="compact-table-container">
                        <table className="compact-table">
                            <thead>
                                <tr>
                                    <th style={{ width: '60px' }}>Conosci?</th>
                                    <th onClick={() => requestSort('nome')} className="sortable-header">
                                        Farmacia {sortConfig.key === 'nome' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                {paginatedRows.map(f => {
                                    const addr = f.indirizzo || (f.note ? f.note.replace(/^Indirizzo:\s*/i, '').split('\n')[0] : '');
                                    return (
                                    <React.Fragment key={f.id}>
                                        <tr className="row-expandable" onClick={() => setExpandedId(expandedId === f.id ? null : f.id)} style={{ opacity: f.conosciuto ? 1 : 0.6 }}>
                                            <td onClick={(e) => e.stopPropagation()}>
                                                <input
                                                    type="checkbox"
                                                    checked={!!f.conosciuto}
                                                    onChange={(e) => {
                                                        updateFarmacia(f.id, 'conosciuto', e.target.checked);
                                                        if (e.target.checked) setDetailModalId(f.id);
                                                    }}
                                                    style={{ width: '18px', height: '18px', cursor: 'pointer' }}
                                                />
                                            </td>
                                            <td onClick={(e) => { e.stopPropagation(); setDetailModalId(f.id); }} style={{ cursor: 'pointer' }}>
                                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '2px' }}>
                                                    <div style={{ color: 'var(--bright-mint)', fontWeight: 'bold', fontSize: '14px' }}>
                                                        {f.nome}
                                                    </div>
                                                    <span className={`pill status-${f.stato.toLowerCase().replace(/ /g, '-')}`} style={{ fontSize: '9px', padding: '1px 6px' }}>
                                                        {f.stato}
                                                    </span>
                                                </div>
                                                <div style={{ fontSize: '11px', color: 'var(--text-main)', marginBottom: '2px' }}>
                                                    {f.citta} ({f.provincia}) • <span style={{ color: 'var(--text-dim)' }}>{f.referente || 'Senza referente'}</span>
                                                </div>
                                                {addr && (
                                                    <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginBottom: '3px', opacity: 0.75 }}>
                                                        {addr}
                                                    </div>
                                                )}
                                                <div style={{ display: 'flex', gap: '12px', fontSize: '10px', color: 'var(--text-dim)' }}>
                                                    <span>
                                                        {(parseInt(f.farmacisti_vengono) || 0) + (parseInt(f.extra_nonfarmacisti) || 0)} Ospiti
                                                    </span>
                                                    <span>F-up: {f.follow_up || '---'}</span>
                                                    {f.gestore && (
                                                        <span style={{ color: 'var(--bright-mint)', opacity: 0.8 }}>
                                                            • {f.gestore}
                                                        </span>
                                                    )}
                                                </div>
                                            </td>
                                        </tr>
                                        {expandedId === f.id && (
                                            <tr>
                                                <td colSpan="2" className="expanded-content">
                                                    <div style={{
                                                        display: 'flex',
                                                        flexDirection: 'column',
                                                        gap: '12px',
                                                        padding: '12px 4px'
                                                    }}>
                                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '8px' }}>
                                                            <div className="expanded-mobile-only"><b>Adesioni (P/E):</b>{' '}
                                                                <InlineEdit type="number" value={f.farmacisti_vengono} onSave={(val) => updateFarmacia(f.id, 'farmacisti_vengono', parseInt(val))} />
                                                                {' / '}
                                                                <InlineEdit type="number" value={f.extra_nonfarmacisti} onSave={(val) => updateFarmacia(f.id, 'extra_nonfarmacisti', parseInt(val))} />
                                                            </div>
                                                            <div className="expanded-mobile-only"><b>Follow-up:</b> <InlineEdit value={f.follow_up} type="date" onSave={(val) => updateFarmacia(f.id, 'follow_up', val)} /></div>
                                                            <div><b>Note:</b> <InlineEdit value={f.note} onSave={(val) => updateFarmacia(f.id, 'note', val)} /></div>
                                                            <div><b>Telefono:</b> <InlineEdit value={f.telefono} onSave={(val) => updateFarmacia(f.id, 'telefono', val)} /></div>
                                                            <div><b>Tot Collaboratori:</b> <InlineEdit type="number" value={f.collaboratori_totali} onSave={(val) => updateFarmacia(f.id, 'collaboratori_totali', parseInt(val))} /></div>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                        )}
                                    </React.Fragment>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>

                    {/* Paginazione */}
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px', padding: '12px 0', fontSize: '12px' }}>
                        {loadingPage && <span style={{ color: 'var(--text-dim)' }}>Caricamento...</span>}
                        {!loadingPage && totalPages > 1 && (
                            <>
                                <button className="btn btn-outline" onClick={() => setPage(0)} disabled={page === 0} style={{ padding: '4px 8px', fontSize: '11px' }}>«</button>
                                <button className="btn btn-outline" onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0} style={{ padding: '4px 8px', fontSize: '11px' }}>‹</button>
                                <span style={{ color: 'var(--text-dim)' }}>
                                    {page + 1} / {totalPages} &nbsp;·&nbsp; {totalCount} risultati
                                </span>
                                <button className="btn btn-outline" onClick={() => setPage(p => Math.min(totalPages - 1, p + 1))} disabled={page === totalPages - 1} style={{ padding: '4px 8px', fontSize: '11px' }}>›</button>
                                <button className="btn btn-outline" onClick={() => setPage(totalPages - 1)} disabled={page === totalPages - 1} style={{ padding: '4px 8px', fontSize: '11px' }}>»</button>
                            </>
                        )}
                    </div>

                    {detailModalId && (() => {
                        const f = farmacie.find(item => item.id === detailModalId);
                        if (!f) return null;
                        return (
                            <div className="modal-overlay" onClick={() => setDetailModalId(null)}>
                                <div className="modal" style={{ width: '620px', maxWidth: '95vw', maxHeight: '90vh', overflowY: 'auto' }} onClick={e => e.stopPropagation()}>

                                    {/* Header con chiudi */}
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                            <span className={`pill status-${f.stato.toLowerCase().replace(/ /g, '-')}`}>
                                                <InlineEdit
                                                    value={f.stato}
                                                    type="select"
                                                    options={['Da contattare', 'Contattato', 'Interessato', 'Confermato', 'Non interessato', 'Follow-up']}
                                                    onSave={(val) => updateFarmacia(f.id, 'stato', val)}
                                                />
                                            </span>
                                            <span style={{ fontSize: '10px', color: 'var(--text-dim)' }}>
                                                Follow-up: <InlineEdit value={f.follow_up} type="date" onSave={(val) => updateFarmacia(f.id, 'follow_up', val)} />
                                            </span>
                                        </div>
                                        <button className="btn btn-outline" onClick={() => setDetailModalId(null)}>✕</button>
                                    </div>

                                    {/* BLOCCO 1 — Anagrafica */}
                                    <div style={{ background: '#0D1310', border: '1px solid var(--border)', borderRadius: '8px', padding: '16px', marginBottom: '12px' }}>
                                        <label style={{ fontSize: '10px', color: 'var(--text-dim)', letterSpacing: '0.5px', display: 'block', marginBottom: '10px' }}>FARMACIA</label>
                                        <div style={{ fontSize: '18px', fontWeight: 'bold', color: 'var(--bright-mint)', marginBottom: '6px' }}>
                                            <InlineEdit value={f.nome} onSave={(val) => updateFarmacia(f.id, 'nome', val)} />
                                        </div>
                                        <div style={{ fontSize: '13px', color: 'var(--text-dim)', marginBottom: '4px' }}>
                                            <InlineEdit value={f.citta} onSave={(val) => updateFarmacia(f.id, 'citta', val)} />
                                            {' '}
                                            (<InlineEdit value={f.provincia} onSave={(val) => updateFarmacia(f.id, 'provincia', val)} />)
                                        </div>
                                        <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>
                                            <InlineEdit value={f.indirizzo || f.note} onSave={(val) => updateFarmacia(f.id, 'indirizzo', val)} />
                                        </div>
                                    </div>

                                    {/* BLOCCO 2 — Comunicazione */}
                                    <div style={{ background: '#0D1310', border: '1px solid var(--border)', borderRadius: '8px', padding: '16px', marginBottom: '12px' }}>
                                        <label style={{ fontSize: '10px', color: 'var(--text-dim)', letterSpacing: '0.5px', display: 'block', marginBottom: '12px' }}>COMUNICAZIONE</label>
                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '16px' }}>
                                            <div>
                                                <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginBottom: '4px' }}>Chi di noi la conosce?</div>
                                                <div style={{ fontSize: '14px', fontWeight: '500' }}>
                                                    <InlineEdit value={f.gestore || ''} onSave={(val) => updateFarmacia(f.id, 'gestore', val)} />
                                                </div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginBottom: '4px' }}>Referente farmacia</div>
                                                <div style={{ fontSize: '14px', fontWeight: '500' }}>
                                                    <InlineEdit value={f.referente} onSave={(val) => updateFarmacia(f.id, 'referente', val)} />
                                                </div>
                                            </div>
                                            <div style={{ gridColumn: '2' }}>
                                                <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginBottom: '4px' }}>Telefono referente</div>
                                                <div style={{ fontSize: '14px', fontWeight: '500', display: 'flex', alignItems: 'center', gap: '8px' }}>
                                                    <InlineEdit value={f.telefono} onSave={(val) => updateFarmacia(f.id, 'telefono', val)} />
                                                    {f.telefono && (
                                                        <a href={`tel:${f.telefono}`} style={{ color: 'var(--bright-mint)', fontSize: '16px', lineHeight: 1 }} title="Chiama">📞</a>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* BLOCCO 3 — Adesioni */}
                                    <div style={{ background: '#0D1310', border: '1px solid var(--border)', borderRadius: '8px', padding: '16px', marginBottom: '12px' }}>
                                        <label style={{ fontSize: '10px', color: 'var(--text-dim)', letterSpacing: '0.5px', display: 'block', marginBottom: '12px' }}>ADESIONI</label>
                                        <div style={{ display: 'flex', gap: '32px' }}>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold' }}>
                                                    <InlineEdit type="number" value={f.farmacisti_vengono} onSave={(val) => updateFarmacia(f.id, 'farmacisti_vengono', parseInt(val))} />
                                                </div>
                                                <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Farmacisti</div>
                                            </div>
                                            <div>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold' }}>
                                                    <InlineEdit type="number" value={f.extra_nonfarmacisti} onSave={(val) => updateFarmacia(f.id, 'extra_nonfarmacisti', parseInt(val))} />
                                                </div>
                                                <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Accompagnatori</div>
                                            </div>
                                            <div style={{ marginLeft: 'auto', textAlign: 'right' }}>
                                                <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'var(--bright-mint)' }}>
                                                    {(parseInt(f.farmacisti_vengono) || 0) + (parseInt(f.extra_nonfarmacisti) || 0)}
                                                </div>
                                                <div style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Totale</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* BLOCCO 4 — Note */}
                                    <div style={{ marginBottom: '20px' }}>
                                        <label style={{ fontSize: '10px', color: 'var(--text-dim)', letterSpacing: '0.5px', display: 'block', marginBottom: '8px' }}>NOTE</label>
                                        <textarea
                                            value={f.note}
                                            onChange={(e) => updateFarmacia(f.id, 'note', e.target.value)}
                                            style={{ width: '100%', height: '80px', resize: 'none', background: '#0D1310', border: '1px solid var(--border)', padding: '10px', borderRadius: '6px', color: 'var(--text-main)', fontSize: '13px' }}
                                            placeholder="Note libere..."
                                        />
                                    </div>

                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                        <button className="btn btn-outline" style={{ color: '#FF5252', borderColor: 'rgba(255,82,82,0.3)' }} onClick={() => { setDetailModalId(null); deleteFarmacia(f.id); }}>
                                            🗑️ Elimina Farmacia
                                        </button>
                                        <button className="btn btn-primary" onClick={() => setDetailModalId(null)}>Chiudi</button>
                                    </div>
                                </div>
                            </div>
                        );
                    })()}
                </div>
            );
        };

        const Sede = ({ sedi, onUpdate, activeSedeId, setActiveSedeId }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [confirm, setConfirm] = useState(null);

            const activeSede = sedi.find(s => s.id === activeSedeId) || sedi[0];

            const updateSedeField = (id, field, val) => {
                const updated = sedi.map(s => s.id === id ? { ...s, [field]: val } : s);
                onUpdate(updated);
            };

            const addSede = (newSede) => {
                const id = Date.now();
                onUpdate([...sedi, {
                    ...newSede,
                    id,
                    costo_totale: parseInt(newSede.costo_totale) || 0,
                    costo_persona: parseInt(newSede.costo_persona) || 0,
                    caparra_richiesta: parseInt(newSede.caparra_richiesta) || 0,
                    caparra_versata: 0
                }]);
                setIsModalOpen(false);
            };

            const deleteSede = (id) => {
                if (sedi.length <= 1) return;
                setConfirm({
                    message: "Sei sicuro di voler eliminare questa sede?",
                    onConfirm: () => {
                        const updated = sedi.filter(s => s.id !== id);
                        onUpdate(updated);
                        if (activeSedeId === id) setActiveSedeId(updated[0].id);
                        setConfirm(null);
                    }
                });
            };

            return (
                <div className="fade-in">
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                        <div style={{ display: 'flex', gap: '8px' }}>
                            {sedi.map(s => (
                                <button
                                    key={s.id}
                                    className={`btn ${activeSedeId === s.id ? 'btn-primary' : 'btn-outline'}`}
                                    onClick={() => setActiveSedeId(s.id)}
                                >
                                    {s.nome}
                                </button>
                            ))}
                        </div>
                        <button className="btn btn-primary" onClick={() => setIsModalOpen(true)}>+ Nuovo Locale</button>
                    </div>

                    {isModalOpen && (
                        <div className="modal-overlay">
                            <div className="modal" style={{ width: '500px' }}>
                                <div className="card-title">Nuovo Locale</div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    addSede(Object.fromEntries(fd));
                                }}>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                        <div className="input-group"><label>Nome Locale</label><input name="nome" required /></div>
                                        <div className="input-group"><label>Indirizzo</label><input name="indirizzo" required /></div>
                                        <div className="input-group"><label>Costo Totale (€)</label><input name="costo_totale" type="number" required /></div>
                                        <div className="input-group"><label>Costo Persona (€)</label><input name="costo_persona" type="number" required /></div>
                                        <div className="input-group"><label>Caparra Richiesta (€)</label><input name="caparra_richiesta" type="number" /></div>
                                        <div className="input-group"><label>Accessibilità</label>
                                            <select name="accessibilita"><option>Ottimo</option><option>Discreto</option><option>Scarso</option></select>
                                        </div>
                                        <div className="input-group"><label>Drink Inclusi</label><input name="offerta_drink" placeholder="es. 2 drink" /></div>
                                        <div className="input-group"><label>Cibo</label><input name="offerta_cibo" placeholder="es. Buffet" /></div>
                                    </div>
                                    <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                                        <button type="submit" className="btn btn-primary">Salva</button>
                                        <button type="button" className="btn btn-outline" onClick={() => setIsModalOpen(false)}>Annulla</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }}>
                        {/* Sezione 1: Identità e Location */}
                        <div className="card">
                            <div className="card-title">Location & Contatti</div>
                            <div style={{ marginBottom: '20px' }}>
                                <h2 style={{ color: 'var(--bright-mint)', marginBottom: '4px', fontSize: '24px' }}>
                                    <InlineEdit value={activeSede.nome} onSave={(val) => updateSedeField(activeSede.id, 'nome', val)} />
                                </h2>
                                <p style={{ fontSize: '13px', color: 'var(--text-dim)' }}>
                                    <i data-lucide="map-pin" style={{ width: '14px', height: '14px', marginRight: '6px', verticalAlign: 'middle' }}></i>
                                    <InlineEdit value={activeSede.indirizzo} onSave={(val) => updateSedeField(activeSede.id, 'indirizzo', val)} />
                                </p>
                            </div>

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                    <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: 'rgba(0, 230, 118, 0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <i data-lucide="car" style={{ width: '16px', height: '16px', color: 'var(--bright-mint)' }}></i>
                                    </div>
                                    <div>
                                        <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Parcheggio</div>
                                        <div style={{ fontSize: '12px' }}><InlineEdit value={activeSede.parcheggio} onSave={(val) => updateSedeField(activeSede.id, 'parcheggio', val)} /></div>
                                    </div>
                                </div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                    <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: 'rgba(0, 230, 118, 0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <i data-lucide="bus" style={{ width: '16px', height: '16px', color: 'var(--bright-mint)' }}></i>
                                    </div>
                                    <div>
                                        <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Mezzi Pubblici</div>
                                        <div style={{ fontSize: '12px' }}><InlineEdit value={activeSede.mezzi} onSave={(val) => updateSedeField(activeSede.id, 'mezzi', val)} /></div>
                                    </div>
                                </div>
                            </div>

                            <div style={{ marginTop: 'auto', paddingTop: '20px' }}>
                                <button
                                    className="btn btn-outline"
                                    style={{ color: '#FF5252', borderColor: 'rgba(255, 82, 82, 0.2)', width: '100%' }}
                                    onClick={(e) => { e.stopPropagation(); deleteSede(activeSede.id); }}
                                >
                                    🗑️ Elimina questa sede
                                </button>
                            </div>
                        </div>

                        {/* Sezione 2: Costi */}
                        <div className="card" style={{ background: 'rgba(0, 77, 64, 0.1)', borderColor: 'var(--accent-green)' }}>
                            <div className="card-title">Costi</div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                                <div className="card" style={{ background: 'var(--bg-dark)', padding: '12px' }}>
                                    <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginBottom: '4px' }}>Quota / Persona</div>
                                    <div style={{ fontSize: '24px', fontWeight: 'bold', color: 'var(--bright-mint)' }}>
                                        €<InlineEdit type="number" value={activeSede.costo_persona} onSave={(val) => updateSedeField(activeSede.id, 'costo_persona', parseInt(val))} />
                                    </div>
                                </div>

                                <div className="card" style={{ background: 'var(--bg-dark)', padding: '12px' }}>
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: activeSede.caparra_richiesta > 0 ? '10px' : '0' }}>
                                        <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Caparra richiesta?</div>
                                        <label style={{ display: 'flex', alignItems: 'center', gap: '6px', cursor: 'pointer' }}>
                                            <input
                                                type="checkbox"
                                                checked={activeSede.caparra_richiesta > 0}
                                                onChange={(e) => updateSedeField(activeSede.id, 'caparra_richiesta', e.target.checked ? 500 : 0)}
                                                style={{ width: '16px', height: '16px', cursor: 'pointer' }}
                                            />
                                            <span style={{ fontSize: '12px', color: activeSede.caparra_richiesta > 0 ? 'var(--bright-mint)' : 'var(--text-dim)' }}>
                                                {activeSede.caparra_richiesta > 0 ? 'Sì' : 'No'}
                                            </span>
                                        </label>
                                    </div>
                                    {activeSede.caparra_richiesta > 0 && (
                                        <div style={{ borderTop: '1px solid var(--border)', paddingTop: '10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                            <span style={{ fontSize: '11px', color: 'var(--text-dim)' }}>Anticipo richiesto</span>
                                            <span style={{ fontSize: '18px', fontWeight: 'bold', color: 'var(--bright-mint)' }}>
                                                €<InlineEdit type="number" value={activeSede.caparra_richiesta} onSave={(val) => updateSedeField(activeSede.id, 'caparra_richiesta', parseInt(val) || 0)} />
                                            </span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Sezione 3: Servizi & Logistica */}
                        <div className="card">
                            <div className="card-title">Servizi Inclusi</div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                                <div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                                        <i data-lucide="glass-water" style={{ width: '16px', color: 'var(--bright-mint)' }}></i>
                                        <b style={{ fontSize: '12px' }}>Drink & Beverage</b>
                                    </div>
                                    <div style={{ fontSize: '13px', paddingLeft: '24px', color: 'var(--text-main)' }}>
                                        <InlineEdit value={activeSede.offerta_drink} onSave={(val) => updateSedeField(activeSede.id, 'offerta_drink', val)} />
                                    </div>
                                </div>
                                <div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                                        <i data-lucide="utensils" style={{ width: '16px', color: 'var(--bright-mint)' }}></i>
                                        <b style={{ fontSize: '12px' }}>Food & Catering</b>
                                    </div>
                                    <div style={{ fontSize: '13px', paddingLeft: '24px', color: 'var(--text-main)' }}>
                                        <InlineEdit value={activeSede.offerta_cibo} onSave={(val) => updateSedeField(activeSede.id, 'offerta_cibo', val)} />
                                    </div>
                                </div>
                                <div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                                        <i data-lucide="check-circle" style={{ width: '16px', color: 'var(--bright-mint)' }}></i>
                                        <b style={{ fontSize: '12px' }}>Livello Accessibilità</b>
                                    </div>
                                    <div style={{ paddingLeft: '24px' }}>
                                        <span className="pill status-confermato">
                                            <InlineEdit value={activeSede.accessibilita} type="select" options={['Ottimo', 'Discreto', 'Scarso']} onSave={(val) => updateSedeField(activeSede.id, 'accessibilita', val)} />
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Sponsors = ({ sponsors, onUpdate }) => {
            const total = sponsors.reduce((a, b) => a + (parseInt(b.importo) || 0), 0);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [confirm, setConfirm] = useState(null);

            const updateSponsor = (id, field, val) => {
                const updated = sponsors.map(s => s.id === id ? { ...s, [field]: val } : s);
                onUpdate(updated);
            };

            const addSponsor = (newSponsor) => {
                onUpdate([...sponsors, { ...newSponsor, id: Date.now(), pagato: 'No' }]);
                setIsModalOpen(false);
            };

            const deleteSponsor = (id) => {
                setConfirm({
                    message: "Sei sicuro di voler eliminare questo sponsor?",
                    onConfirm: () => {
                        onUpdate(sponsors.filter(s => s.id !== id));
                        setConfirm(null);
                    }
                });
            };

            return (
                <div className="fade-in">
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                        <div className="big-number" style={{ fontSize: '24px' }}>€{total} <span style={{ fontSize: '12px', color: 'var(--text-dim)' }}>totale sponsor</span></div>
                        <button className="btn btn-primary" onClick={() => setIsModalOpen(true)}>+ Nuovo Sponsor</button>
                    </div>

                    {isModalOpen && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <div className="card-title">Nuovo Sponsor</div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    addSponsor(Object.fromEntries(fd));
                                }}>
                                    <div className="input-group"><label>Nome Referente</label><input name="referente" required /></div>
                                    <div className="input-group"><label>Azienda</label><input name="nome" required /></div>
                                    <div className="input-group"><label>Importo (€)</label><input name="importo" type="number" required /></div>
                                    <div className="input-group">
                                        <label>Stato Pagamento</label>
                                        <select name="pagato">
                                            <option value="No">No</option>
                                            <option value="In corso">In corso</option>
                                            <option value="Sì">Sì</option>
                                        </select>
                                    </div>
                                    <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                                        <button type="submit" className="btn btn-primary">Salva</button>
                                        <button type="button" className="btn btn-outline" onClick={() => setIsModalOpen(false)}>Annulla</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    <div className="compact-table-container">
                        <table className="compact-table">
                            <thead>
                                <tr>
                                    <th>Sponsor (Referente)</th>
                                    <th>Azienda</th>
                                    <th>Importo</th>
                                    <th>Stato Pagamento</th>
                                    <th style={{ width: '40px' }}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {sponsors.map(s => (
                                    <tr key={s.id}>
                                        <td><InlineEdit value={s.referente} onSave={(val) => updateSponsor(s.id, 'referente', val)} /></td>
                                        <td><InlineEdit value={s.nome} onSave={(val) => updateSponsor(s.id, 'nome', val)} /></td>
                                        <td>€<InlineEdit type="number" value={s.importo} onSave={(val) => updateSponsor(s.id, 'importo', parseInt(val))} /></td>
                                        <td>
                                            <span className={`pill status-${s.pagato === 'Sì' ? 'confermato' : (s.pagato === 'In corso' ? 'in-corso' : 'non-interessato')}`}>
                                                <InlineEdit value={s.pagato} type="select" options={['Sì', 'No', 'In corso']} onSave={(val) => updateSponsor(s.id, 'pagato', val)} />
                                            </span>
                                        </td>
                                        <td>
                                            <button
                                                className="btn-delete"
                                                onClick={(e) => { e.stopPropagation(); deleteSponsor(s.id); }}
                                                title="Elimina"
                                            >
                                                🗑️
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const Roadmap = ({ phases, onUpdate }) => {
            const updatePhase = (id, field, val) => {
                const updated = phases.map(p => p.id === id ? { ...p, [field]: val } : p);
                onUpdate(updated);
            };

            return (
                <div className="roadmap-container fade-in">
                    <div className="timeline">
                        <div className="timeline-line"></div>
                        {phases.map(p => (
                            <div key={p.id} className={`timeline-item ${p.stato === 'Futuro' ? 'futuro' : ''}`}>
                                <div className="timeline-dot"></div>
                                <div className="roadmap-phase-num">{p.fase}</div>
                                <h3 className="roadmap-phase-title">
                                    <InlineEdit value={p.titolo} onSave={(val) => updatePhase(p.id, 'titolo', val)} />
                                </h3>

                                <ul className="checklist">
                                    {p.checklist.map((item, i) => (
                                        <li
                                            key={i}
                                            className={item && item.completed ? 'completed' : ''}
                                            style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '8px' }}
                                        >
                                            <div
                                                onClick={() => {
                                                    const newChecklist = p.checklist.map((c, idx) =>
                                                        idx === i ? { ...c, completed: !c.completed } : c
                                                    );
                                                    updatePhase(p.id, 'checklist', newChecklist);
                                                }}
                                                style={{
                                                    width: '18px',
                                                    height: '18px',
                                                    border: '1px solid var(--border)',
                                                    borderRadius: '4px',
                                                    background: item && item.completed ? 'var(--bright-mint)' : 'transparent',
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'center',
                                                    flexShrink: 0,
                                                    cursor: 'pointer'
                                                }}
                                            >
                                                {item && item.completed && <span style={{ fontSize: '11px', color: '#000', fontWeight: 'bold', lineHeight: 1 }}>✓</span>}
                                            </div>
                                            <div style={{ flexGrow: 1, fontSize: '13px' }}>
                                                <InlineEdit
                                                    value={item ? item.text : ''}
                                                    onSave={(val) => {
                                                        const newChecklist = p.checklist.map((c, idx) =>
                                                            idx === i ? { ...c, text: val } : c
                                                        );
                                                        updatePhase(p.id, 'checklist', newChecklist);
                                                    }}
                                                />
                                            </div>
                                        </li>
                                    ))}
                                </ul>

                                {p.traguardo && (
                                    <div className="roadmap-badge traguardo">
                                        <i data-lucide="target" style={{ width: '12px', height: '12px' }}></i>
                                        {p.traguardo}
                                    </div>
                                )}

                                <div className="roadmap-badge">
                                    <i data-lucide="zap" style={{ width: '12px', height: '12px' }}></i>
                                    {p.stato}
                                </div>

                                <div style={{ marginTop: '12px', width: '100%' }}>
                                    <textarea
                                        placeholder="Note libere..."
                                        value={p.note}
                                        onChange={(e) => updatePhase(p.id, 'note', e.target.value)}
                                        style={{ width: '100%', minHeight: '60px', height: 'auto', resize: 'vertical', background: '#0D1310', border: '1px solid #1D2622', borderRadius: '4px', padding: '8px', fontSize: '12px', lineHeight: '1.5', color: 'var(--text-main)', boxSizing: 'border-box' }}
                                        rows={Math.max(2, (p.note || '').split('\n').length)}
                                    />
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="milestones-card">
                        <div className="card-title" style={{ marginBottom: '24px' }}>Traguardi</div>

                        <div className="milestone-row">
                            <div className="milestone-label">Si blinda il locale</div>
                            <div className="milestone-value v-50">50</div>
                        </div>

                        <div className="milestone-row">
                            <div className="milestone-label">Google Form + evento sostenibile</div>
                            <div className="milestone-value v-100">100</div>
                        </div>

                        <div className="milestone-row">
                            <div className="milestone-label">Margine positivo, evento di qualità</div>
                            <div className="milestone-value v-200">200</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const Partecipanti = ({ partecipanti, farmacieNomi = [], onUpdate }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [filter, setFilter] = useState('');
            const [confirm, setConfirm] = useState(null);

            const addPartecipante = (p) => {
                onUpdate([...partecipanti, { ...p, id: Date.now() }]);
                setIsModalOpen(false);
            };

            const updatePartecipante = (id, field, val) => {
                onUpdate(partecipanti.map(p => p.id === id ? { ...p, [field]: val } : p));
            };

            const deletePartecipante = (id) => {
                setConfirm({
                    message: "Rimuovere questo partecipante?",
                    onConfirm: () => {
                        onUpdate(partecipanti.filter(p => p.id !== id));
                        setConfirm(null);
                    }
                });
            };

            const filtered = partecipanti.filter(p =>
                (p.nome + ' ' + p.cognome + ' ' + p.farmacia).toLowerCase().includes(filter.toLowerCase())
            );

            return (
                <div className="fade-in">
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', background: '#111915', padding: '12px', borderRadius: '8px', alignItems: 'center', flexWrap: 'wrap' }}>
                        <div style={{ flexGrow: 1, minWidth: '150px' }}>
                            <input
                                placeholder="Cerca partecipante..."
                                value={filter}
                                onChange={e => setFilter(e.target.value)}
                            />
                        </div>
                        <button className="btn btn-primary" style={{ whiteSpace: 'nowrap' }} onClick={() => setIsModalOpen(true)}>+ Aggiungi</button>
                    </div>

                    {isModalOpen && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <div className="card-title">Nuovo Partecipante</div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    addPartecipante(Object.fromEntries(fd));
                                }}>
                                    <div className="input-group"><label>Nome</label><input name="nome" required /></div>
                                    <div className="input-group"><label>Cognome</label><input name="cognome" required /></div>

                                    <div className="input-group">
                                        <label>Farmacia</label>
                                        <input
                                            name="farmacia"
                                            list="farmacie-list"
                                            placeholder="Cerca farmacia o scrivi nuova..."
                                            required
                                            autoComplete="off"
                                        />
                                        <datalist id="farmacie-list">
                                            {farmacieNomi.map(f => <option key={f.id} value={f.nome} />)}
                                        </datalist>
                                    </div>

                                    <div className="input-group">
                                        <label>Ruolo del Referente</label>
                                        <select name="ruolo" required>
                                            <option value="Farmacista">Farmacista</option>
                                            <option value="Accompagnatore">Accompagnatore</option>
                                        </select>
                                    </div>

                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                        <div className="input-group">
                                            <label>Colleghi Farmacisti</label>
                                            <input name="colleghi_farmacisti" type="number" defaultValue="0" min="0" />
                                        </div>
                                        <div className="input-group">
                                            <label>Accompagnatori</label>
                                            <input name="accompagnatori" type="number" defaultValue="0" min="0" />
                                        </div>
                                    </div>

                                    <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                                        <button type="submit" className="btn btn-primary">Salva</button>
                                        <button type="button" className="btn btn-outline" onClick={() => setIsModalOpen(false)}>Annulla</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Mobile View: Card List */}
                    <div className="mobile-view" style={{ display: 'none' }}>
                        {filtered.length > 0 ? filtered.map(p => (
                            <div key={p.id} className="card" style={{ marginBottom: '10px', padding: '12px' }}>
                                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                                    <div style={{ flexGrow: 1 }}>
