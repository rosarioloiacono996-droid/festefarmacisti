    <style>
        :root {
            --bg-dark: #0A0F0D;
            --sidebar-bg: #0E1412;
            --card-bg: #141B18;
            --accent-green: #004D40;
            --bright-mint: #00E676;
            --text-main: #E0E6E3;
            --text-dim: #8A9B93;
            --border: #1D2622;
            --font-main: 'DM Sans', sans-serif;
            --font-title: 'Syne', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 13px;
            line-height: 1.2;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Compact Layout */
        #root {
            display: flex;
            height: 100vh;
            height: 100dvh; /* iOS Safari: dynamic viewport excludes browser chrome */
            flex-direction: row;
        }

        /* Sidebar */
        .sidebar {
            width: 180px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 12px 8px;
            flex-shrink: 0;
        }

        .logo {
            font-family: var(--font-title);
            font-size: 16px;
            color: var(--bright-mint);
            margin-bottom: 24px;
            padding-left: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 8px;
            color: var(--text-dim);
            text-decoration: none;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 4px;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--accent-green);
            color: white;
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
            margin-right: 8px;
        }

        /* Content Area */
        .content {
            flex-grow: 1;
            padding: 12px 16px;
            overflow-y: auto;
            position: relative;
        }

        /* Dashboard specific - Above the fold constraint */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            height: calc(100vh - 40px); /* Fit to screen */
            grid-template-rows: auto auto 1fr;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-family: var(--font-title);
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .big-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--bright-mint);
            line-height: 1;
        }

        .progress-container {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin: 8px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--bright-mint);
            transition: width 0.3s;
        }

        /* Tables - Information Density */
        .compact-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .compact-table th {
            text-align: left;
            padding: 6px 8px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }

        .sortable-header {
            cursor: pointer;
            transition: all 0.2s;
        }

        .sortable-header:hover {
            color: var(--bright-mint) !important;
            background: rgba(0, 230, 118, 0.05);
        }

        .pipeline-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        @media (max-width: 768px) {
            .pipeline-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .pipeline-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .btn-delete {
            background: transparent !important;
            border: none !important;
            color: #FF5252 !important;
            cursor: pointer !important;
            padding: 8px !important;
            border-radius: 4px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
        }

        .btn-delete:hover {
            background: rgba(255, 82, 82, 0.1) !important;
            transform: scale(1.2);
        }

        .compact-table td {
            padding: 4px 8px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .row-expandable {
            cursor: pointer;
        }

        .row-expandable:hover {
            background: rgba(0, 230, 118, 0.05);
        }

        .expanded-content {
            background: #0D1310;
            padding: 8px 12px;
            font-size: 11px;
        }

        /* Status Pills */
        .pill {
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: bold;
            display: inline-block;
        }

        .status-confermato { background: #004D40; color: #00E676; }
        .status-contattato { background: #1A2621; color: #8A9B93; }
        .status-interessato { background: #1D3328; color: #B2FF59; }
        .status-non-interessato { background: #331D1D; color: #FF5252; }
        .status-follow-up { background: #332B1D; color: #FFD740; }
        .status-in-corso { background: #1D2B33; color: #00B0FF; }

        /* Forms/Inputs */
        .input-group {
            margin-bottom: 8px;
        }

        input, select, textarea {
            background: #1D2622;
            border: 1px solid var(--border);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: var(--card-bg);
            border: 1px solid var(--bright-mint);
            border-radius: 8px;
            width: 400px;
            max-width: 90vw;
            padding: 16px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-primary { background: var(--bright-mint); color: black; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease-out; }

        /* High Density Overrides */
        .grid-compact {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        /* Roadmap specific */
        .roadmap-container {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 32px;
            padding-top: 20px;
        }

        .timeline {
            position: relative;
            padding-left: 30px;
        }

        .timeline-line {
            position: absolute;
            left: 5px;
            top: 10px;
            bottom: 0;
            width: 2px;
            background: var(--accent-green);
        }

        .timeline-item {
            position: relative;
            margin-bottom: 40px;
        }

        .timeline-dot {
            position: absolute;
            left: -30px;
            top: 6px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--bright-mint);
            border: 2px solid var(--bg-dark);
            z-index: 2;
        }

        .timeline-item.futuro .timeline-dot {
            background: var(--accent-green);
        }

        .roadmap-phase-num {
            font-size: 10px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .roadmap-phase-title {
            font-family: var(--font-title);
            font-size: 16px;
            margin-bottom: 12px;
        }

        .checklist {
            list-style: none;
            padding: 0;
            margin-bottom: 16px;
        }

        .checklist li {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
        }

        .checklist li::before {
            content: "•";
            color: var(--bright-mint);
            margin-right: 8px;
        }

        .roadmap-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: rgba(0, 230, 118, 0.1);
            color: var(--bright-mint);
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .roadmap-badge.traguardo {
            background: rgba(255, 215, 64, 0.1);
            color: #FFD740;
        }

        .milestones-card {
            background: #0E1412;
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 8px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            #root {
                flex-direction: column-reverse; /* Bottom nav */
            }

            .sidebar {
                width: 100%;
                height: auto;
                min-height: 70px;
                padding-bottom: env(safe-area-inset-bottom, 10px);
                flex-direction: row;
                justify-content: space-around;
                align-items: stretch;
                position: relative;
                z-index: 1000;
                background: var(--sidebar-bg);
                border-right: none;
                border-top: 1px solid var(--border);
            }

            .logo {
                display: none; /* Hide logo in bottom nav */
            }

            .nav-item {
                flex-direction: column;
                justify-content: center;
                align-items: center;
                text-align: center;
                margin-bottom: 0;
                padding: 6px 2px;
                font-size: 12px;
                gap: 3px;
                flex: 1;
                border-radius: 0;
            }

            .nav-item svg {
                margin-right: 0;
                width: 22px;
                height: 22px;
            }

            .sidebar div:last-child {
                display: none; /* Hide "Cloud Active" info on mobile sidebar */
            }

            .content {
                height: calc(100vh - 70px);
                height: calc(100dvh - 70px);
                padding: 12px;
                padding-bottom: 24px;
            }

            .dashboard-grid {
                grid-template-columns: 1fr;
                grid-template-rows: auto;
                height: auto;
                gap: 16px;
            }

            .grid-compact {
                grid-template-columns: 1fr;
            }

            .roadmap-container {
                grid-template-columns: 1fr;
                gap: 24px;
                padding-top: 10px;
            }

            .milestones-card {
                width: 100%;
                position: static;
                order: -1; /* Show milestones at top on mobile? Or bottom? Let's go bottom for better flow. Actually order: 2 */
                order: 2;
            }

            .compact-table-container {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin: 0 -12px;
                padding: 0 12px;
            }

            .compact-table {
                min-width: 600px; /* Force scroll for tables */
            }

            .modal {
                width: 95vw;
                padding: 12px;
            }

            .big-number {
                font-size: 24px;
            }

            .card-title {
                font-size: 10px;
            }

            /* Improve touch targets (Apple/Google min 44px) */
            .btn, .nav-item {
                min-height: 44px;
            }

            input, select, textarea {
                min-height: 44px;
                padding: 10px 8px;
                font-size: 16px; /* Prevents iOS auto-zoom on focus */
            }

            .compact-table td {
                padding: 10px 8px;
            }
        }

        /* Mobile-only expanded fields — hidden on desktop */
        .expanded-mobile-only {
            display: none;
        }

        @media (max-width: 768px) {
            /* Nascondi colonne Adesioni e Follow-up: appaiono solo nel pannello espanso */
            .compact-table th:nth-child(6),
            .compact-table td:nth-child(6),
            .compact-table th:nth-child(7),
            .compact-table td:nth-child(7) {
                display: none;
            }

            .expanded-mobile-only {
                display: block;
            }
        }

        @media (max-width: 480px) {
            .compact-table {
                font-size: 11px;
            }
        }

        .milestone-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .milestone-label {
            font-size: 12px;
            color: var(--text-dim);
        }

        .milestone-value {
            font-family: var(--font-title);
            font-size: 32px;
            font-weight: 800;
        }

        .v-50 { color: #FFA000; }
        .v-100 { color: #00B0FF; }
        .v-200 { color: #00E676; }

    </style>
</head>

            const [isEditing, setIsEditing] = useState(false);
            const [currentValue, setCurrentValue] = useState(value);

            const handleSave = () => {
                onSave(currentValue);
                setIsEditing(false);
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') handleSave();
                if (e.key === 'Escape') {
                    setCurrentValue(value);
                    setIsEditing(false);
                }
            };

            if (isEditing) {
                if (type === "select" && options) {
                    return (
                        <select 
                            value={currentValue} 
                            onChange={(e) => { setCurrentValue(e.target.value); onSave(e.target.value); setIsEditing(false); }}
                            onBlur={() => setIsEditing(false)}
                            autoFocus
                            style={{ padding: '2px', fontSize: '11px', width: 'auto' }}
                        >
                            {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                        </select>
                    );
                }
                return (
                    <input 
                        type={type}
                        value={currentValue}
                        onChange={(e) => setCurrentValue(e.target.value)}
                        onBlur={handleSave}
                        onKeyDown={handleKeyDown}
                        autoFocus
                        style={{ padding: '2px', fontSize: '11px', width: 'auto', background: '#1D2622', border: '1px solid var(--bright-mint)' }}
                    />
                );
            }

                <span 
                    onClick={(e) => { e.stopPropagation(); setIsEditing(true); }}
                    style={{ cursor: 'pointer', borderBottom: '1px dashed rgba(0, 230, 118, 0.3)' }}

                        onUpdate(farmacie.filter(f => f.id !== id));
                        setConfirm(null);
                    }
                });
            };

            const addFarmacia = (newFarmacia) => {
                onUpdate([...farmacie, { ...newFarmacia, id: Date.now(), conosciuto: true, stato: 'Da contattare', farmacisti_vengono: 0, extra_nonfarmacisti: 0, follow_up: new Date().toISOString().split('T')[0] }]);
                setIsModalOpen(false);
            };

            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') {
                    direction = 'desc';
                }
                setSortConfig({ key, direction });
            };

            const filteredAndSorted = farmacie
                .filter(f => {
                    const matchesText = (f.nome + f.citta + (f.provincia || '')).toLowerCase().includes(filter.toLowerCase());
                    const matchesStatus = statusFilter === 'Tutti' || f.stato === statusFilter;
                    return matchesText && matchesStatus;
                })
                .sort((a, b) => {
                    let valA, valB;
                    
                    if (sortConfig.key === 'adesioni') {
                        valA = (parseInt(a.farmacisti_vengono) || 0) + (parseInt(a.extra_nonfarmacisti) || 0);
                        valB = (parseInt(b.farmacisti_vengono) || 0) + (parseInt(b.extra_nonfarmacisti) || 0);
                    } else {
                        valA = a[sortConfig.key] || '';
                        valB = b[sortConfig.key] || '';
                    }

                    if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });

            return (
                <div className="fade-in">

                                onChange={e => setStatusFilter(e.target.value)}
                                style={{ width: '100%' }}

                                <option>Da contattare</option>
                                <option>Contattato</option>
                                <option>Interessato</option>
                                <option>Confermato</option>
                                <option>Follow-up</option>
                                <option>Non interessato</option>
                            </select>

                                    <div className="input-group"><label>Telefono</label><input name="telefono" /></div>

                                    </div>
                                </form>
                            </div>

                                        Farmacia {sortConfig.key === 'nome' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => requestSort('citta')} className="sortable-header">
                                        Località {sortConfig.key === 'citta' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => requestSort('referente')} className="sortable-header">
                                        Referente {sortConfig.key === 'referente' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => requestSort('stato')} className="sortable-header">
                                        Stato {sortConfig.key === 'stato' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => requestSort('adesioni')} className="sortable-header">
                                        Adesioni (P/E) {sortConfig.key === 'adesioni' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th onClick={() => requestSort('follow_up')} className="sortable-header">
                                        Follow-up {sortConfig.key === 'follow_up' && (sortConfig.direction === 'asc' ? '↑' : '↓')}
                                    </th>
                                    <th style={{ width: '40px' }}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredAndSorted.map(f => (
                                    <React.Fragment key={f.id}>
                                        <tr className="row-expandable" onClick={() => setExpandedId(expandedId === f.id ? null : f.id)} style={{ opacity: f.conosciuto ? 1 : 0.6 }}>
                                            <td onClick={(e) => e.stopPropagation()}>
                                                <input 
                                                    type="checkbox" 
                                                    checked={!!f.conosciuto} 
                                                    onChange={(e) => updateFarmacia(f.id, 'conosciuto', e.target.checked)}
                                                    style={{ width: '18px', height: '18px', cursor: 'pointer' }}
                                                />
                                            </td>
                                            <td style={{ pointerEvents: f.conosciuto ? 'auto' : 'none' }}><InlineEdit value={f.nome} onSave={(val) => updateFarmacia(f.id, 'nome', val)} /></td>
                                            <td style={{ pointerEvents: f.conosciuto ? 'auto' : 'none' }}>
                                                <InlineEdit value={f.citta} onSave={(val) => updateFarmacia(f.id, 'citta', val)} /> 
                                                <span style={{ color: 'var(--text-dim)', marginLeft: '4px' }}>
                                                    (<InlineEdit value={f.provincia} onSave={(val) => updateFarmacia(f.id, 'provincia', val)} />)
                                                </span>
                                            </td>
                                            <td style={{ pointerEvents: f.conosciuto ? 'auto' : 'none' }}><InlineEdit value={f.referente} onSave={(val) => updateFarmacia(f.id, 'referente', val)} /></td>
                                            <td style={{ pointerEvents: f.conosciuto ? 'auto' : 'none' }}>
                                                <span className={`pill status-${f.stato.toLowerCase().replace(/ /g, '-')}`}>
                                                    <InlineEdit 
                                                        value={f.stato} 
                                                        type="select" 
                                                        options={['Da contattare', 'Contattato', 'Interessato', 'Confermato', 'Non interessato', 'Follow-up']}
                                                        onSave={(val) => updateFarmacia(f.id, 'stato', val)} 
                                                    />
                                                </span>
                                            </td>
                                            <td style={{ pointerEvents: f.conosciuto ? 'auto' : 'none' }}>
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '4px' }}>

                                                    🗑️
                                                </button>
                                            </td>
                                        </tr>
                                        {expandedId === f.id && (
                                            <tr>
                                                <td colSpan="8" className="expanded-content">
                                                    <div style={{ 
                                                        display: 'flex', 
                                                        flexDirection: 'column', 
                                                        gap: '12px', 
                                                        padding: '12px 4px',
                                                        opacity: f.conosciuto ? 1 : 0.5,
                                                        pointerEvents: f.conosciuto ? 'auto' : 'none'
                                                    }}>
                                                        <div style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '8px' }}>
                                                            <div className="expanded-mobile-only"><b>Adesioni (P/E):</b>{' '}
                                                                <InlineEdit type="number" value={f.farmacisti_vengono} onSave={(val) => updateFarmacia(f.id, 'farmacisti_vengono', parseInt(val))} />
                                                                {' / '}
                                                                <InlineEdit type="number" value={f.extra_nonfarmacisti} onSave={(val) => updateFarmacia(f.id, 'extra_nonfarmacisti', parseInt(val))} />
                                                            </div>
                                                            <div className="expanded-mobile-only"><b>Follow-up:</b> <InlineEdit value={f.follow_up} type="date" onSave={(val) => updateFarmacia(f.id, 'follow_up', val)} /></div>
                                                            <div><b>Note:</b> <InlineEdit value={f.note} onSave={(val) => updateFarmacia(f.id, 'note', val)} /></div>
                                                            <div><b>Telefono:</b> <InlineEdit value={f.telefono} onSave={(val) => updateFarmacia(f.id, 'telefono', val)} /></div>
                                                            <div><b>Tot Collaboratori:</b> <InlineEdit type="number" value={f.collaboratori_totali} onSave={(val) => updateFarmacia(f.id, 'collaboratori_totali', parseInt(val))} /></div>
                                                        </div>
                                                    </div>
                                                </td>
                                            </tr>
                                        )}
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const Sede = ({ sedi, onUpdate, activeSedeId, setActiveSedeId }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [simParticipants, setSimParticipants] = useState(100);
            const [confirm, setConfirm] = useState(null);

            const activeSede = sedi.find(s => s.id === activeSedeId) || sedi[0];

            const updateSedeField = (id, field, val) => {
                const updated = sedi.map(s => s.id === id ? { ...s, [field]: val } : s);
                onUpdate(updated);
            };

            const addSede = (newSede) => {
                const id = Date.now();
                onUpdate([...sedi, { 
                    ...newSede, 
                    id,
                    costo_totale: parseInt(newSede.costo_totale) || 0,
                    costo_persona: parseInt(newSede.costo_persona) || 0,
                    caparra_richiesta: parseInt(newSede.caparra_richiesta) || 0,
                    caparra_versata: 0
                }]);
                setIsModalOpen(false);
            };

            const deleteSede = (id) => {
                if (sedi.length <= 1) return;
                setConfirm({
                    message: "Sei sicuro di voler eliminare questa sede?",
                    onConfirm: () => {
                        const updated = sedi.filter(s => s.id !== id);
                        onUpdate(updated);
                        if (activeSedeId === id) setActiveSedeId(updated[0].id);
                        setConfirm(null);
                    }
                });
            };

            return (
                <div className="fade-in">
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' }}>
                        <div style={{ display: 'flex', gap: '8px' }}>
                            {sedi.map(s => (
                                <button 
                                    key={s.id} 
                                    className={`btn ${activeSedeId === s.id ? 'btn-primary' : 'btn-outline'}`}
                                    onClick={() => setActiveSedeId(s.id)}
                                >
                                    {s.nome}
                                </button>
                            ))}
                        </div>
                        <button className="btn btn-primary" onClick={() => setIsModalOpen(true)}>+ Nuovo Locale</button>
                    </div>

                    {isModalOpen && (
                        <div className="modal-overlay">
                            <div className="modal" style={{ width: '500px' }}>
                                <div className="card-title">Nuovo Locale</div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    addSede(Object.fromEntries(fd));
                                }}>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                                        <div className="input-group"><label>Nome Locale</label><input name="nome" required /></div>
                                        <div className="input-group"><label>Indirizzo</label><input name="indirizzo" required /></div>
                                        <div className="input-group"><label>Costo Totale (€)</label><input name="costo_totale" type="number" required /></div>
                                        <div className="input-group"><label>Costo Persona (€)</label><input name="costo_persona" type="number" required /></div>
                                        <div className="input-group"><label>Caparra Richiesta (€)</label><input name="caparra_richiesta" type="number" /></div>
                                        <div className="input-group"><label>Accessibilità</label>
                                            <select name="accessibilita"><option>Ottimo</option><option>Discreto</option><option>Scarso</option></select>
                                        </div>
                                        <div className="input-group"><label>Drink Inclusi</label><input name="offerta_drink" placeholder="es. 2 drink" /></div>
                                        <div className="input-group"><label>Cibo</label><input name="offerta_cibo" placeholder="es. Buffet" /></div>
                                    </div>
                                    <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                                        <button type="submit" className="btn btn-primary">Salva</button>
                                        <button type="button" className="btn btn-outline" onClick={() => setIsModalOpen(false)}>Annulla</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(300px, 1fr))', gap: '20px' }}>
                        {/* Sezione 1: Identità e Location */}
                        <div className="card">
                            <div className="card-title">Location & Contatti</div>
                            <div style={{ marginBottom: '20px' }}>
                                <h2 style={{ color: 'var(--bright-mint)', marginBottom: '4px', fontSize: '24px' }}>
                                    <InlineEdit value={activeSede.nome} onSave={(val) => updateSedeField(activeSede.id, 'nome', val)} />
                                </h2>
                                <p style={{ fontSize: '13px', color: 'var(--text-dim)' }}>
                                    <i data-lucide="map-pin" style={{ width: '14px', height: '14px', marginRight: '6px', verticalAlign: 'middle' }}></i>
                                    <InlineEdit value={activeSede.indirizzo} onSave={(val) => updateSedeField(activeSede.id, 'indirizzo', val)} />
                                </p>
                            </div>

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                    <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: 'rgba(0, 230, 118, 0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <i data-lucide="car" style={{ width: '16px', height: '16px', color: 'var(--bright-mint)' }}></i>
                                    </div>
                                    <div>
                                        <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Parcheggio</div>
                                        <div style={{ fontSize: '12px' }}><InlineEdit value={activeSede.parcheggio} onSave={(val) => updateSedeField(activeSede.id, 'parcheggio', val)} /></div>
                                    </div>
                                </div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                                    <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: 'rgba(0, 230, 118, 0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                        <i data-lucide="bus" style={{ width: '16px', height: '16px', color: 'var(--bright-mint)' }}></i>
                                    </div>
                                    <div>
                                        <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Mezzi Pubblici</div>
                                        <div style={{ fontSize: '12px' }}><InlineEdit value={activeSede.mezzi} onSave={(val) => updateSedeField(activeSede.id, 'mezzi', val)} /></div>
                                    </div>
                                </div>
                            </div>
                            
                            <div style={{ marginTop: 'auto', paddingTop: '20px' }}>
                                <button 
                                    className="btn btn-outline" 
                                    style={{ color: '#FF5252', borderColor: 'rgba(255, 82, 82, 0.2)', width: '100%' }}
                                    onClick={(e) => { e.stopPropagation(); deleteSede(activeSede.id); }}
                                >
                                    🗑️ Elimina questa sede
                                </button>
                            </div>
                        </div>

                        {/* Sezione 2: Costi & Simulazione */}
                        <div className="card" style={{ background: 'rgba(0, 77, 64, 0.1)', borderColor: 'var(--accent-green)' }}>

                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', marginBottom: '20px' }}>
                                <div className="card" style={{ background: 'var(--bg-dark)', padding: '12px' }}>
                                    <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Fisso Locale</div>
                                    <div style={{ fontSize: '20px', fontWeight: 'bold', color: 'var(--bright-mint)' }}>
                                        €<InlineEdit type="number" value={activeSede.costo_totale} onSave={(val) => updateSedeField(activeSede.id, 'costo_totale', parseInt(val))} />
                                    </div>
                                </div>
                                <div className="card" style={{ background: 'var(--bg-dark)', padding: '12px' }}>
                                    <div style={{ fontSize: '10px', color: 'var(--text-dim)' }}>Quota / Persona</div>
                                    <div style={{ fontSize: '20px', fontWeight: 'bold', color: 'var(--bright-mint)' }}>
                                        €<InlineEdit type="number" value={activeSede.costo_persona} onSave={(val) => updateSedeField(activeSede.id, 'costo_persona', parseInt(val))} />
                                    </div>
                                </div>
                            </div>

                            <div style={{ background: 'rgba(0,0,0,0.2)', padding: '16px', borderRadius: '8px' }}>
                                <div className="card-title" style={{ fontSize: '9px' }}>Simulatore Rapido</div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '16px' }}>
                                    <input 
                                        type="number" 
                                        value={simParticipants} 
                                        onChange={e => setSimParticipants(e.target.value)}
                                        style={{ width: '80px', textAlign: 'center' }}
                                    />
                                    <span style={{ fontSize: '12px' }}>Partecipanti</span>
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '4px', fontSize: '12px' }}>
                                    <span>Costo Variabile:</span>
                                    <span>€{simParticipants * activeSede.costo_persona}</span>
                                </div>
                                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '14px', fontWeight: 'bold', borderTop: '1px solid var(--border)', paddingTop: '8px', marginTop: '8px' }}>
                                    <span>Totale Stimato:</span>
                                    <span style={{ color: 'var(--bright-mint)' }}>€{(simParticipants * activeSede.costo_persona) + activeSede.costo_totale}</span>
                                </div>
                            </div>
                        </div>

                        {/* Sezione 3: Servizi & Logistica */}
                        <div className="card">
                            <div className="card-title">Servizi Inclusi</div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '16px' }}>
                                <div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                                        <i data-lucide="glass-water" style={{ width: '16px', color: 'var(--bright-mint)' }}></i>
                                        <b style={{ fontSize: '12px' }}>Drink & Beverage</b>
                                    </div>
                                    <div style={{ fontSize: '13px', paddingLeft: '24px', color: 'var(--text-main)' }}>
                                        <InlineEdit value={activeSede.offerta_drink} onSave={(val) => updateSedeField(activeSede.id, 'offerta_drink', val)} />
                                    </div>
                                </div>
                                <div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                                        <i data-lucide="utensils" style={{ width: '16px', color: 'var(--bright-mint)' }}></i>
                                        <b style={{ fontSize: '12px' }}>Food & Catering</b>
                                    </div>
                                    <div style={{ fontSize: '13px', paddingLeft: '24px', color: 'var(--text-main)' }}>
                                        <InlineEdit value={activeSede.offerta_cibo} onSave={(val) => updateSedeField(activeSede.id, 'offerta_cibo', val)} />
                                    </div>
                                </div>
                                <div>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px' }}>
                                        <i data-lucide="check-circle" style={{ width: '16px', color: 'var(--bright-mint)' }}></i>
                                        <b style={{ fontSize: '12px' }}>Livello Accessibilità</b>
                                    </div>
                                    <div style={{ paddingLeft: '24px' }}>
                                        <span className="pill status-confermato">
                                            <InlineEdit value={activeSede.accessibilita} type="select" options={['Ottimo', 'Discreto', 'Scarso']} onSave={(val) => updateSedeField(activeSede.id, 'accessibilita', val)} />
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Sponsors = ({ sponsors, onUpdate }) => {
            const total = sponsors.reduce((a, b) => a + (parseInt(b.importo) || 0), 0);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [confirm, setConfirm] = useState(null);

            const updateSponsor = (id, field, val) => {
                const updated = sponsors.map(s => s.id === id ? { ...s, [field]: val } : s);
                onUpdate(updated);
            };

            const addSponsor = (newSponsor) => {
                onUpdate([...sponsors, { ...newSponsor, id: Date.now(), pagato: 'No' }]);
                setIsModalOpen(false);
            };

            const deleteSponsor = (id) => {
                setConfirm({
                    message: "Sei sicuro di voler eliminare questo sponsor?",
                    onConfirm: () => {
                        onUpdate(sponsors.filter(s => s.id !== id));
                        setConfirm(null);
                    }
                });
            };

            return (
                <div className="fade-in">
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '12px' }}>
                        <div className="big-number" style={{ fontSize: '24px' }}>€{total} <span style={{ fontSize: '12px', color: 'var(--text-dim)' }}>totale sponsor</span></div>
                        <button className="btn btn-primary" onClick={() => setIsModalOpen(true)}>+ Nuovo Sponsor</button>
                    </div>

                    {isModalOpen && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <div className="card-title">Nuovo Sponsor</div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    addSponsor(Object.fromEntries(fd));
                                }}>
                                    <div className="input-group"><label>Nome Referente</label><input name="referente" required /></div>
                                    <div className="input-group"><label>Azienda</label><input name="nome" required /></div>
                                    <div className="input-group"><label>Importo (€)</label><input name="importo" type="number" required /></div>
                                    <div className="input-group">

                                            <option value="Sì">Sì</option>
                                        </select>

                                        <button type="submit" className="btn btn-primary">Salva</button>
                                        <button type="button" className="btn btn-outline" onClick={() => setIsModalOpen(false)}>Annulla</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                    <div className="compact-table-container">
                        <table className="compact-table">
                            <thead>
                                <tr>
                                    <th>Sponsor (Referente)</th>
                                    <th>Azienda</th>
                                    <th>Importo</th>
                                    <th>Stato Pagamento</th>
                                    <th style={{ width: '40px' }}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {sponsors.map(s => (
                                    <tr key={s.id}>
                                        <td><InlineEdit value={s.referente} onSave={(val) => updateSponsor(s.id, 'referente', val)} /></td>
                                        <td><InlineEdit value={s.nome} onSave={(val) => updateSponsor(s.id, 'nome', val)} /></td>
                                        <td>€<InlineEdit type="number" value={s.importo} onSave={(val) => updateSponsor(s.id, 'importo', parseInt(val))} /></td>
                                        <td>
                                            <span className={`pill status-${s.pagato === 'Sì' ? 'confermato' : (s.pagato === 'In corso' ? 'in-corso' : 'non-interessato')}`}>
                                                <InlineEdit value={s.pagato} type="select" options={['Sì', 'No', 'In corso']} onSave={(val) => updateSponsor(s.id, 'pagato', val)} />
                                            </span>
                                        </td>
                                        <td>
                                            <button 
                                                className="btn-delete"
                                                onClick={(e) => { e.stopPropagation(); deleteSponsor(s.id); }} 
                                                title="Elimina"
