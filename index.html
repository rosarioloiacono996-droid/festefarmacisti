                                                🗑️
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const Roadmap = ({ phases, onUpdate }) => {
            const updatePhase = (id, field, val) => {
                const updated = phases.map(p => p.id === id ? { ...p, [field]: val } : p);
                onUpdate(updated);
            };

            return (
                <div className="roadmap-container fade-in">
                    <div className="timeline">
                        <div className="timeline-line"></div>
                        {phases.map(p => (
                            <div key={p.id} className={`timeline-item ${p.stato === 'Futuro' ? 'futuro' : ''}`}>
                                <div className="timeline-dot"></div>
                                <div className="roadmap-phase-num">{p.fase}</div>
                                <h3 className="roadmap-phase-title">
                                    <InlineEdit value={p.titolo} onSave={(val) => updatePhase(p.id, 'titolo', val)} />
                                </h3>
                                
                                <ul className="checklist">
                                    {p.checklist.map((item, i) => (
                                        <li 
                                            key={i} 
                                            className={item && item.completed ? 'completed' : ''}
                                            onClick={() => {
                                                try {
                                                    const newChecklist = p.checklist.map((c, idx) => 
                                                        idx === i ? { ...c, completed: !c.completed } : c
                                                    );
                                                    updatePhase(p.id, 'checklist', newChecklist);
                                                } catch (err) {
                                                    console.error("Errore aggiornamento checklist:", err);
                                                }
                                            }}
                                            style={{ cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '8px' }}
                                        >
                                            <div style={{ 
                                                width: '12px', 
                                                height: '12px', 
                                                border: '1px solid var(--border)', 
                                                borderRadius: '2px',
                                                background: item && item.completed ? 'var(--bright-mint)' : 'transparent',
                                                display: 'flex',
                                                alignItems: 'center',
                                                justifyContent: 'center',
                                                flexShrink: 0
                                            }}>
                                                {item && item.completed && <i data-lucide="check" style={{ width: '10px', height: '10px', color: '#000', pointerEvents: 'none' }}></i>}
                                            </div>
                                            <span>{item ? item.text : ''}</span>
                                        </li>
                                    ))}
                                </ul>

                                {p.traguardo && (
                                    <div className="roadmap-badge traguardo">
                                        <i data-lucide="target" style={{ width: '12px', height: '12px' }}></i>
                                        {p.traguardo}
                                    </div>
                                )}

                                <div className="roadmap-badge">
                                    <i data-lucide="zap" style={{ width: '12px', height: '12px' }}></i>
                                    {p.stato}
                                </div>

                                <div style={{ marginTop: '12px', maxWidth: '100%', width: '450px' }}>
                                    <textarea 
                                        placeholder="Note libere..." 
                                        value={p.note}
                                        onChange={(e) => updatePhase(p.id, 'note', e.target.value)}
                                        style={{ width: '100%', height: '80px', resize: 'none', background: '#0D1310', border: '1px solid #1D2622' }}
                                    />
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="milestones-card">
                        <div className="card-title" style={{ marginBottom: '24px' }}>Traguardi</div>
                        
                        <div className="milestone-row">
                            <div className="milestone-label">Si blinda il locale</div>
                            <div className="milestone-value v-50">50</div>
                        </div>

                        <div className="milestone-row">
                            <div className="milestone-label">Google Form + evento sostenibile</div>
                            <div className="milestone-value v-100">100</div>
                        </div>

                        <div className="milestone-row">
                            <div className="milestone-label">Margine positivo, evento di qualità</div>
                            <div className="milestone-value v-200">200</div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        const Partecipanti = ({ partecipanti, farmacie, onUpdate }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [filter, setFilter] = useState('');
            const [confirm, setConfirm] = useState(null);

            const addPartecipante = (p) => {
                onUpdate([...partecipanti, { ...p, id: Date.now() }]);
                setIsModalOpen(false);
            };

            const deletePartecipante = (id) => {
                setConfirm({
                    message: "Rimuovere questo partecipante?",
                    onConfirm: () => {
                        onUpdate(partecipanti.filter(p => p.id !== id));
                        setConfirm(null);
                    }
                });
            };

            const filtered = partecipanti.filter(p => 
                (p.nome + ' ' + p.cognome + ' ' + p.farmacia).toLowerCase().includes(filter.toLowerCase())
            );

            return (
                <div className="fade-in">
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div style={{ display: 'flex', gap: '8px', marginBottom: '16px', background: '#111915', padding: '12px', borderRadius: '8px', alignItems: 'center' }}>
                        <div style={{ flexGrow: 1 }}>
                            <input 
                                placeholder="Cerca partecipante..." 
                                value={filter} 
                                onChange={e => setFilter(e.target.value)}
                            />
                        </div>
                        <button className="btn btn-primary" onClick={() => setIsModalOpen(true)}>+ Aggiungi</button>
                    </div>

                    {isModalOpen && (
                        <div className="modal-overlay">
                            <div className="modal">
                                <div className="card-title">Nuovo Partecipante</div>
                                <form onSubmit={(e) => {
                                    e.preventDefault();
                                    const fd = new FormData(e.target);
                                    addPartecipante(Object.fromEntries(fd));
                                }}>
                                    <div className="input-group"><label>Nome</label><input name="nome" required /></div>
                                    <div className="input-group"><label>Cognome</label><input name="cognome" required /></div>
                                    <div className="input-group">
                                        <label>Farmacia</label>
                                        <select name="farmacia" required>
                                            <option value="">Seleziona...</option>
                                            {farmacie.map(f => <option key={f.id} value={f.nome}>{f.nome}</option>)}
                                        </select>
                                    </div>
                                    <div className="input-group">
                                        <label>Ruolo</label>
                                        <select name="is_farmacista" required>
                                            <option value="Sì">Farmacista</option>
                                            <option value="No">Extra / Altro</option>
                                        </select>
                                    </div>
                                    <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                                        <button type="submit" className="btn btn-primary">Salva</button>
                                        <button type="button" className="btn btn-outline" onClick={() => setIsModalOpen(false)}>Annulla</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="compact-table-container">
                        <table className="compact-table">
                            <thead>
                                <tr>
                                    <th>Nome e Cognome</th>
                                    <th>Farmacia</th>
                                    <th>Ruolo</th>
                                    <th style={{ width: '40px' }}></th>
                                </tr>
                            </thead>
                            <tbody>
                                {filtered.length > 0 ? filtered.map(p => (
                                    <tr key={p.id}>
                                        <td>{p.nome} {p.cognome}</td>
                                        <td>{p.farmacia}</td>
                                        <td>
                                            <span className={`pill status-${p.is_farmacista === 'Sì' ? 'confermato' : 'contattato'}`}>
                                                {p.is_farmacista === 'Sì' ? 'Farmacista' : 'Extra'}
                                            </span>
                                        </td>
                                        <td>
                                            <button className="btn-delete" onClick={() => deletePartecipante(p.id)}>🗑️</button>
                                        </td>
                                    </tr>
                                )) : (
                                    <tr><td colSpan="4" style={{ textAlign: 'center', padding: '20px', color: 'var(--text-dim)' }}>Nessun partecipante registrato.</td></tr>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [farmacie, setFarmacie] = useState(INITIAL_FARMACIE);
            const [sedi, setSedi] = useState(INITIAL_SEDI);
            const [activeSedeId, setActiveSedeId] = useState(1);
            const [sponsors, setSponsors] = useState(INITIAL_SPONSOR);
            const [roadmap, setRoadmap] = useState(INITIAL_ROADMAP);
            const [partecipanti, setPartecipanti] = useState(INITIAL_PARTECIPANTI);
            const [isLoading, setIsLoading] = useState(false);
            const [supabaseKey, setSupabaseKey] = useState(SUPABASE_KEY);

            const supabaseClient = useMemo(() => {
                console.log("Inizializzazione client Supabase...");
                try {
                    if (SUPABASE_URL && supabaseKey && window.supabase) {
                        const client = window.supabase.createClient(SUPABASE_URL, supabaseKey);
                        console.log("Client Supabase creato con successo.");
                        return client;
                    }
                } catch (e) {
                    console.error("Errore inizializzazione Supabase:", e);
                }
                console.warn("Client Supabase non pronto: dati mancanti o libreria non caricata.");
                return null;
            }, [supabaseKey]);

            const exportToCSV = (data, filename) => {
                if (!data || !data.length) return;
                const headers = Object.keys(data[0]).join(",");
                const rows = data.map(obj => Object.values(obj).map(v => `"${v}"`).join(",")).join("\n");
                const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows;
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", filename);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // Funzione per caricare i dati da Supabase
            const loadDataFromSupabase = async () => {
                if (!supabaseClient) {
                    window.alert("Client Supabase non pronto. Controlla la tua connessione internet o la Anon Key.");
                    return;
                }
                setIsLoading(true);
                try {
                    const { data, error } = await supabaseClient
                        .from('app_state')
                        .select('*')
                        .limit(1)
                        .single();
                    
                    if (error) throw error;

                    if (data && data.content) {
                        const content = data.content;
                        if (content.farmacie) setFarmacie(content.farmacie);
                        if (content.sedi) setSedi(content.sedi);
                        if (content.sponsors) setSponsors(content.sponsors);
                        if (content.roadmap) setRoadmap(content.roadmap);
                        if (content.partecipanti) setPartecipanti(content.partecipanti);
                        window.alert("Dati caricati con successo da Supabase!");
                    } else {
                        window.alert("Database collegato ma vuoto. Usa 'Inizializza Database' per caricare i primi dati.");
                    }
                } catch (error) {
                    console.error("Errore Supabase:", error);
                    window.alert("Errore durante il caricamento: " + error.message);
                }
                setIsLoading(false);
            };

            const saveDataToSupabase = async (type, newData) => {
                if (!supabaseClient) {
                    window.alert("Client Supabase non pronto.");
                    return;
                }
                
                let stateToSave;
                if (type === 'force_reset') {
                    stateToSave = {
                        farmacie: INITIAL_FARMACIE,
                        sedi: INITIAL_SEDI,
                        sponsors: INITIAL_SPONSOR,
                        roadmap: INITIAL_ROADMAP
                    };
                } else if (type === 'all') {
                    stateToSave = { farmacie, sedi, sponsors, roadmap, partecipanti };
                } else {
                    stateToSave = {
                        farmacie: type === 'farmacie' ? newData : farmacie,
                        sedi: type === 'sedi' ? newData : sedi,
                        sponsors: type === 'sponsors' ? newData : sponsors,
                        roadmap: type === 'roadmap' ? newData : roadmap,
                        partecipanti: type === 'partecipanti' ? newData : partecipanti
                    };
                }

                try {
                    const { error } = await supabaseClient
                        .from('app_state')
                        .upsert({ id: 1, content: stateToSave, updated_at: new Date() });
                    
                    if (error) throw error;
                    if (type === 'force_reset' || type === 'all') {
                        window.alert("✅ Sincronizzazione completata! I dati sono ora su Supabase.");
                    }
                } catch (error) {
                    console.error("Errore Supabase:", error);
                    window.alert("❌ Errore: " + error.message);
                }
            };

            useEffect(() => {
                if (supabaseClient) loadDataFromSupabase();
            }, [supabaseClient]);

            useEffect(() => {
                // Inizializzazione icone Lucide
                // Lucide icons initialization
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, farmacie, sedi, sponsors, roadmap]);

            const activeSede = sedi.find(s => s.id === activeSedeId) || sedi[0];

            // Wrappers per aggiornare i dati e sincronizzarli
            const updateFarmacie = (data) => { setFarmacie(data); saveDataToSupabase('farmacie', data); };
            const updateSedi = (data) => { setSedi(data); saveDataToSupabase('sedi', data); };
            const updateSponsors = (data) => { setSponsors(data); saveDataToSupabase('sponsors', data); };
            const updateRoadmap = (data) => { setRoadmap(data); saveDataToSupabase('roadmap', data); };
            const updatePartecipanti = (data) => { setPartecipanti(data); saveDataToSupabase('partecipanti', data); };

            const renderContent = () => {
                if (isLoading) return <div style={{ display: 'flex', height: '100%', alignItems: 'center', justifyContent: 'center' }}>Caricamento dati...</div>;
                
                switch(activeTab) {
                    case 'dashboard': return <Dashboard data={farmacie} sede={activeSede} sponsors={sponsors} setActiveTab={setActiveTab} />;
                    case 'crm': return <CRM farmacie={farmacie} onUpdate={updateFarmacie} />;
                    case 'sede': return <Sede sedi={sedi} onUpdate={updateSedi} activeSedeId={activeSedeId} setActiveSedeId={setActiveSedeId} />;
                    case 'sponsors': return <Sponsors sponsors={sponsors} onUpdate={updateSponsors} />;
                    case 'partecipanti': return <Partecipanti partecipanti={partecipanti} farmacie={farmacie} onUpdate={updatePartecipanti} />;
                    case 'roadmap': return <Roadmap phases={roadmap} onUpdate={updateRoadmap} />;
                    case 'menu': return (
                        <Menu 
                            setActiveTab={setActiveTab} 
                            supabaseClient={supabaseClient}
                        />
                    );
                    case 'settings': return (
                        <Settings 
                            url={supabaseKey} 
                            setUrl={setSupabaseKey} 
                            loadData={loadDataFromSupabase} 
                            supabaseClient={supabaseClient}
                            exportFarmacie={() => exportToCSV(farmacie, 'farmacie.csv')} 
                            exportToSupabase={(force) => saveDataToSupabase(force ? 'force_reset' : 'all', null)} 
                        />
                    );
                    default: return <Dashboard data={farmacie} sede={activeSede} sponsors={sponsors} />;
                }
            };

            return (
                <React.Fragment>
                    <nav className="sidebar">
                        <div className="logo">EVENTO FARMACISTI</div>
                        <div className={`nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>
                            <i data-lucide="layout-dashboard"></i> Dashboard
                        </div>
                        <div className={`nav-item ${activeTab === 'crm' ? 'active' : ''}`} onClick={() => setActiveTab('crm')}>
                            <i data-lucide="building-2"></i> CRM Farmacie
                        </div>
                        <div className={`nav-item ${activeTab === 'partecipanti' ? 'active' : ''}`} onClick={() => setActiveTab('partecipanti')}>
                            <i data-lucide="users"></i> Partecipanti
                        </div>
                        <div className={`nav-item ${activeTab === 'roadmap' ? 'active' : ''}`} onClick={() => setActiveTab('roadmap')}>
                            <i data-lucide="milestone"></i> Roadmap
                        </div>
                        <div className={`nav-item ${activeTab === 'menu' ? 'active' : ''}`} onClick={() => setActiveTab('menu')}>
                            <i data-lucide="more-horizontal"></i> Altro
                        </div>
                        
                        <div style={{ 
                            marginTop: 'auto', 
                            padding: '8px', 
                            fontSize: '10px', 
                            color: supabaseClient ? 'var(--bright-mint)' : '#FF5252', 
                            textAlign: 'center',
                            borderTop: '1px solid var(--border)'
                        }}>
                            <i data-lucide={supabaseClient ? "cloud-check" : "cloud-off"} style={{ width: '12px', marginBottom: '4px' }}></i>
                            <br/>
                            {supabaseClient ? 'CLOUD ACTIVE' : 'LOCAL MODE'}
                            <br/>
                            V. 1.2.0
                        </div>
                    </nav>
                    <main className="content">
                        {renderContent()}
                    </main>
                </React.Fragment>
            );
        };

        const Menu = ({ setActiveTab, supabaseClient }) => {
            const menuItems = [
                { id: 'sede', label: 'Gestione Sede', icon: 'map-pin', desc: 'Dettagli e costi location' },
                { id: 'sponsors', label: 'Sponsor & Partner', icon: 'dollar-sign', desc: 'Budget e contributi' },
                { id: 'settings', label: 'Impostazioni Cloud', icon: 'settings', desc: 'Configurazione Supabase e Backup' },
            ];

            return (
                <div className="fade-in" style={{ maxWidth: '500px', margin: '0 auto' }}>
                    <div className="card-title" style={{ marginBottom: '24px', textAlign: 'center' }}>Menu Avanzato</div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
                        {menuItems.map(item => (
                            <div 
                                key={item.id} 
                                className="card" 
                                style={{ 
                                    display: 'flex', 
                                    alignItems: 'center', 
                                    gap: '16px', 
                                    cursor: 'pointer',
                                    padding: '20px',
                                    transition: 'transform 0.2s, background 0.2s',
                                    border: '1px solid var(--border)'
                                }}
                                onClick={() => setActiveTab(item.id)}
                                onMouseEnter={(e) => e.currentTarget.style.background = '#1A2621'}
                                onMouseLeave={(e) => e.currentTarget.style.background = 'var(--card-bg)'}
                            >
                                <div style={{ 
                                    width: '40px', 
                                    height: '40px', 
                                    borderRadius: '12px', 
                                    background: 'rgba(0, 230, 118, 0.1)', 
                                    display: 'flex', 
                                    alignItems: 'center', 
                                    justifyContent: 'center' 
                                }}>
                                    <i data-lucide={item.icon} style={{ color: 'var(--bright-mint)', width: '20px' }}></i>
                                </div>
                                <div style={{ flexGrow: 1 }}>
                                    <div style={{ fontWeight: 'bold', fontSize: '16px' }}>{item.label}</div>
                                    <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>{item.desc}</div>
                                </div>
                                <i data-lucide="chevron-right" style={{ width: '16px', color: 'var(--text-dim)' }}></i>
                            </div>
                        ))}
                    </div>

                    <div className="card" style={{ marginTop: '32px', textAlign: 'center', background: 'transparent', border: '1px dashed var(--border)' }}>
                        <div style={{ 
                            fontSize: '11px', 
                            color: supabaseClient ? 'var(--bright-mint)' : '#FF5252',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            gap: '8px'
                        }}>
                            <i data-lucide={supabaseClient ? "cloud-check" : "cloud-off"} style={{ width: '14px' }}></i>
                            {supabaseClient ? 'DATABASE SINCRONIZZATO' : 'MODALITÀ LOCALE'}
                        </div>
                        <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginTop: '8px' }}>Versione 1.2.5 • PharmaConnect Manager</div>
                    </div>
                </div>
            );
        };

        const Settings = ({ url, setUrl, loadData, exportFarmacie, exportToSupabase, supabaseClient }) => {
            const [tempUrl, setTempUrl] = useState(url);
            const isConnected = !!supabaseClient;
            const [confirm, setConfirm] = useState(null);

            return (
                <div className="fade-in" style={{ maxWidth: '600px' }}>
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div className="card">
                        <div className="card-title">Configurazione Supabase</div>
                        
                        <div style={{ 
                            padding: '8px 12px', 
                            borderRadius: '4px', 
                            background: isConnected ? 'rgba(0, 230, 118, 0.1)' : 'rgba(255, 82, 82, 0.1)',
                            color: isConnected ? 'var(--bright-mint)' : '#FF5252',
                            fontSize: '11px',
                            fontWeight: 'bold',
                            marginBottom: '16px',
                            display: 'flex',
                            alignItems: 'center',
                            gap: '8px'
                        }}>
                            <div style={{ 
                                width: '8px', 
                                height: '8px', 
                                borderRadius: '50%', 
                                background: isConnected ? 'var(--bright-mint)' : '#FF5252',
                                boxShadow: isConnected ? '0 0 8px var(--bright-mint)' : 'none'
                            }}></div>
                            {isConnected ? 'SISTEMA COLLEGATO A SUPABASE' : 'SISTEMA NON COLLEGATO'}
                        </div>

                        <div className="input-group">
                            <label>Supabase Anon Key</label>
                            <input 
                                type="password"
                                value={tempUrl} 
                                onChange={e => setTempUrl(e.target.value)} 
                                placeholder="Inserisci la Anon Key..."
                            />
                        </div>
                        
                        <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                            <button className="btn btn-primary" onClick={() => {
                                setUrl(tempUrl);
                                window.alert("Key aggiornata. L'app tenterà ora la connessione.");
                            }}>Salva Key</button>
                            
                            <button className="btn btn-outline" onClick={() => {
                                if (!isConnected) {
                                    window.alert("Impossibile caricare: Supabase non collegato.");
                                } else {
                                    loadData();
                                }
                            }}>Ricarica dal Cloud</button>
                        </div>

                        <div style={{ marginTop: '24px', borderTop: '1px solid var(--border)', paddingTop: '20px' }}>
                            <div className="card-title" style={{ color: 'var(--bright-mint)' }}>Sincronizzazione Dati</div>
                            <p style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '12px' }}>
                                Usa questi comandi per allineare i dati tra questo computer e il cloud.
                            </p>
                            
                            <button
                                className="btn btn-outline"
                                style={{ width: '100%', borderColor: 'var(--bright-mint)', color: 'var(--bright-mint)', marginBottom: '10px' }}
                                onClick={() => {
                                    if (!isConnected) return;
                                    setConfirm({
                                        message: "Vuoi inviare i dati attuali al Cloud?",
                                        onConfirm: async () => { setConfirm(null); await exportToSupabase(false); }
                                    });
                                }}
                            >
                                <i data-lucide="upload-cloud" style={{ width: '14px', marginRight: '6px' }}></i>
                                Invia dati al Cloud (Sync)
                            </button>

                            <button
                                className="btn btn-outline"
                                style={{ width: '100%', borderColor: '#FF5252', color: '#FF5252' }}
                                onClick={() => {
                                    if (!isConnected) return;
                                    setConfirm({
                                        message: "⚠️ ATTENZIONE: Questo sovrascriverà tutto il database con le 50 farmacie originali. Sei sicuro?",
                                        onConfirm: async () => { setConfirm(null); await exportToSupabase(true); }
                                    });
                                }}
                            >
                                <i data-lucide="refresh-cw" style={{ width: '14px', marginRight: '6px' }}></i>
                                RESET TOTALE (Ripristina 50 Farmacie)
                            </button>
                        </div>
                    </div>

                    <div className="card" style={{ marginTop: '16px' }}>
                        <div className="card-title">Backup Locale</div>
                        <p style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '12px' }}>Scarica una copia dei dati in formato CSV.</p>
                        <button className="btn btn-outline" onClick={exportFarmacie}>Scarica CSV Farmacie</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
