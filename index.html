                                        <div style={{ fontWeight: 'bold', fontSize: '14px', color: 'var(--text-main)' }}>
                                            <InlineEdit value={p.nome} onSave={(val) => updatePartecipante(p.id, 'nome', val)} />
                                            {' '}
                                            <InlineEdit value={p.cognome} onSave={(val) => updatePartecipante(p.id, 'cognome', val)} />
                                        </div>
                                        <div style={{ fontSize: '11px', color: 'var(--text-dim)', marginTop: '4px' }}>
                                            <InlineEdit value={p.farmacia} onSave={(val) => updatePartecipante(p.id, 'farmacia', val)} />
                                        </div>
                                    </div>
                                    <button className="btn-delete" onClick={() => deletePartecipante(p.id)} style={{ padding: '4px' }}>🗑️</button>
                                </div>
                                <div style={{ marginTop: '10px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                    <InlineEdit value={p.ruolo} type="select" options={['Farmacista', 'Accompagnatore']} onSave={(val) => updatePartecipante(p.id, 'ruolo', val)} />
                                    <div style={{ display: 'flex', gap: '8px', alignItems: 'center', fontSize: '11px' }}>
                                        <span style={{ color: 'var(--text-dim)' }}>F: <InlineEdit type="number" value={p.colleghi_farmacisti || 0} onSave={(val) => updatePartecipante(p.id, 'colleghi_farmacisti', parseInt(val) || 0)} /></span>
                                        <span style={{ color: 'var(--text-dim)' }}>A: <InlineEdit type="number" value={p.accompagnatori || 0} onSave={(val) => updatePartecipante(p.id, 'accompagnatori', parseInt(val) || 0)} /></span>
                                    </div>
                                </div>
                            </div>
                        )) : (
                            <div style={{ textAlign: 'center', padding: '40px', color: 'var(--text-dim)' }}>Nessun partecipante trovato.</div>
                        )}
                    </div>

                    {/* Desktop View: Table */}
                    <div className="desktop-view">
                        <div className="compact-table-container">
                            <table className="compact-table">
                                <thead>
                                    <tr>
                                        <th>Nome e Cognome</th>
                                        <th>Farmacia</th>
                                        <th>Ruolo</th>
                                        <th>Extra (C/A)</th>
                                        <th style={{ width: '40px' }}></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filtered.length > 0 ? filtered.map(p => (
                                        <tr key={p.id}>
                                            <td>
                                                <InlineEdit value={p.nome} onSave={(val) => updatePartecipante(p.id, 'nome', val)} />
                                                {' '}
                                                <InlineEdit value={p.cognome} onSave={(val) => updatePartecipante(p.id, 'cognome', val)} />
                                            </td>
                                            <td><InlineEdit value={p.farmacia} onSave={(val) => updatePartecipante(p.id, 'farmacia', val)} /></td>
                                            <td>
                                                <InlineEdit
                                                    value={p.ruolo}
                                                    type="select"
                                                    options={['Farmacista', 'Accompagnatore']}
                                                    onSave={(val) => updatePartecipante(p.id, 'ruolo', val)}
                                                />
                                            </td>
                                            <td style={{ fontSize: '11px' }}>
                                                <div style={{ display: 'flex', gap: '6px', alignItems: 'center' }}>
                                                    <span style={{ color: 'var(--text-dim)', fontSize: '10px' }}>F:</span>
                                                    <InlineEdit type="number" value={p.colleghi_farmacisti || 0} onSave={(val) => updatePartecipante(p.id, 'colleghi_farmacisti', parseInt(val) || 0)} />
                                                    <span style={{ color: 'var(--text-dim)', fontSize: '10px' }}>A:</span>
                                                    <InlineEdit type="number" value={p.accompagnatori || 0} onSave={(val) => updatePartecipante(p.id, 'accompagnatori', parseInt(val) || 0)} />
                                                </div>
                                            </td>
                                            <td>
                                                <button className="btn-delete" onClick={() => deletePartecipante(p.id)}>🗑️</button>
                                            </td>
                                        </tr>
                                    )) : (
                                        <tr><td colSpan="5" style={{ textAlign: 'center', padding: '20px', color: 'var(--text-dim)' }}>Nessun partecipante registrato.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };
        const App = () => {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [crmStatusFilter, setCrmStatusFilter] = useState('Tutti');
            const [farmacieStats, setFarmacieStats] = useState({ total: 0, conosciute: 0 });
            const [farmacieNomi, setFarmacieNomi] = useState([]);
            const [sedi, setSedi] = useState(INITIAL_SEDI);
            const [activeSedeId, setActiveSedeId] = useState(1);
            const [sponsors, setSponsors] = useState(INITIAL_SPONSOR);
            const [roadmap, setRoadmap] = useState(INITIAL_ROADMAP);
            const [partecipanti, setPartecipanti] = useState(INITIAL_PARTECIPANTI);
            const [isLoading, setIsLoading] = useState(false);
            const [supabaseKey, setSupabaseKey] = useState(SUPABASE_KEY);

            const supabaseClient = useMemo(() => {
                console.log("Inizializzazione client Supabase...");
                try {
                    if (SUPABASE_URL && supabaseKey && window.supabase) {
                        const client = window.supabase.createClient(SUPABASE_URL, supabaseKey);
                        console.log("Client Supabase creato con successo.");
                        return client;
                    }
                } catch (e) {
                    console.error("Errore inizializzazione Supabase:", e);
                }
                console.warn("Client Supabase non pronto: dati mancanti o libreria non caricata.");
                return null;
            }, [supabaseKey]);

            const exportToCSV = (data, filename) => {
                if (!data || !data.length) return;
                const headers = Object.keys(data[0]).join(",");
                const rows = data.map(obj => Object.values(obj).map(v => `"${v}"`).join(",")).join("\n");
                const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + rows;
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", filename);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const loadFarmacieStats = useCallback(async () => {
                if (!supabaseClient) return;
                const [r1, r2, r3] = await Promise.all([
                    supabaseClient.from('farmacie').select('*', { count: 'exact', head: true }),
                    supabaseClient.from('farmacie').select('*', { count: 'exact', head: true }).eq('conosciuto', true),
                    supabaseClient.from('farmacie').select('id,nome').order('nome')
                ]);
                setFarmacieStats({ total: r1.count || 0, conosciute: r2.count || 0 });
                setFarmacieNomi(r3.data || []);
            }, [supabaseClient]);

            // Funzione per caricare i dati da Supabase
            const loadDataFromSupabase = async () => {
                if (!supabaseClient) {
                    window.alert("Client Supabase non pronto. Controlla la tua connessione internet o la Anon Key.");
                    return;
                }
                setIsLoading(true);
                try {
                    const { data, error } = await supabaseClient
                        .from('app_state')
                        .select('*')
                        .limit(1)
                        .single();

                    if (error) throw error;

                    if (data && data.content) {
                        const content = data.content;
                        if (content.sedi) setSedi(content.sedi);
                        if (content.sponsors) setSponsors(content.sponsors);
                        if (content.roadmap) setRoadmap(content.roadmap);
                        if (content.partecipanti) setPartecipanti(content.partecipanti);
                    }
                } catch (error) {
                    console.error("Errore Supabase:", error);
                    window.alert("Errore durante il caricamento: " + error.message);
                }
                setIsLoading(false);
            };

            const saveDataToSupabase = async (type, newData) => {
                if (!supabaseClient) {
                    window.alert("Client Supabase non pronto.");
                    return;
                }

                let stateToSave;
                if (type === 'force_reset') {
                    stateToSave = { sedi: INITIAL_SEDI, sponsors: INITIAL_SPONSOR, roadmap: INITIAL_ROADMAP };
                } else if (type === 'all') {
                    stateToSave = { sedi, sponsors, roadmap, partecipanti };
                } else {
                    stateToSave = {
                        sedi: type === 'sedi' ? newData : sedi,
                        sponsors: type === 'sponsors' ? newData : sponsors,
                        roadmap: type === 'roadmap' ? newData : roadmap,
                        partecipanti: type === 'partecipanti' ? newData : partecipanti
                    };
                }

                try {
                    const { error } = await supabaseClient
                        .from('app_state')
                        .upsert({ id: 1, content: stateToSave, updated_at: new Date() });

                    if (error) throw error;
                    if (type === 'force_reset' || type === 'all') {
                        window.alert("✅ Sincronizzazione completata! I dati sono ora su Supabase.");
                    }
                } catch (error) {
                    console.error("Errore Supabase:", error);
                    window.alert("❌ Errore: " + error.message);
                }
            };

            useEffect(() => {
                if (supabaseClient) { loadDataFromSupabase(); loadFarmacieStats(); }
            }, [supabaseClient]);

            useEffect(() => {
                // Inizializzazione icone Lucide
                // Lucide icons initialization
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, sedi, sponsors, roadmap]);

            const activeSede = sedi.find(s => s.id === activeSedeId) || sedi[0];

            // Wrappers per aggiornare i dati e sincronizzarli
            const updateSedi = (data) => { setSedi(data); saveDataToSupabase('sedi', data); };
            const updateSponsors = (data) => { setSponsors(data); saveDataToSupabase('sponsors', data); };
            const updateRoadmap = (data) => { setRoadmap(data); saveDataToSupabase('roadmap', data); };
            const updatePartecipanti = (data) => { setPartecipanti(data); saveDataToSupabase('partecipanti', data); };

            const renderContent = () => {
                if (isLoading) return <div style={{ display: 'flex', height: '100%', alignItems: 'center', justifyContent: 'center' }}>Caricamento dati...</div>;

                switch (activeTab) {
                    case 'dashboard': return (
                        <Dashboard
                            farmacieStats={farmacieStats}
                            sede={activeSede}
                            sponsors={sponsors}
                            setActiveTab={setActiveTab}
                            setStatusFilter={setCrmStatusFilter}
                            partecipanti={partecipanti}
                        />
                    );
                    case 'crm': return (
                        <CRM
                            supabaseClient={supabaseClient}
                            statusFilter={crmStatusFilter}
                            setStatusFilter={setCrmStatusFilter}
                            onStatsChange={loadFarmacieStats}
                        />
                    );
                    case 'sede': return <Sede sedi={sedi} onUpdate={updateSedi} activeSedeId={activeSedeId} setActiveSedeId={setActiveSedeId} />;
                    case 'sponsors': return <Sponsors sponsors={sponsors} onUpdate={updateSponsors} />;
                    case 'partecipanti': return <Partecipanti partecipanti={partecipanti} farmacieNomi={farmacieNomi} onUpdate={updatePartecipanti} />;
                    case 'roadmap': return <Roadmap phases={roadmap} onUpdate={updateRoadmap} />;
                    case 'menu': return (
                        <Menu
                            setActiveTab={setActiveTab}
                            supabaseClient={supabaseClient}
                        />
                    );
                    case 'settings': return (
                        <Settings
                            url={supabaseKey}
                            setUrl={setSupabaseKey}
                            loadData={loadDataFromSupabase}
                            supabaseClient={supabaseClient}
                            exportToSupabase={(force) => saveDataToSupabase(force ? 'force_reset' : 'all', null)}
                        />
                    );
                    default: return <Dashboard farmacieStats={farmacieStats} sede={activeSede} sponsors={sponsors} partecipanti={partecipanti} />;
                }
            };

            return (
                <React.Fragment>
                    <nav className="sidebar">
                        <div className="logo">EVENTO FARMACISTI</div>
                        <div className={`nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>
                            <i data-lucide="layout-dashboard"></i> Dashboard
                        </div>
                        <div className={`nav-item ${activeTab === 'roadmap' ? 'active' : ''}`} onClick={() => setActiveTab('roadmap')}>
                            <i data-lucide="milestone"></i> Roadmap
                        </div>
                        <div className={`nav-item ${activeTab === 'menu' ? 'active' : ''}`} onClick={() => setActiveTab('menu')}>
                            <i data-lucide="more-horizontal"></i> Altro
                        </div>

                        <div style={{
                            marginTop: 'auto',
                            padding: '8px',
                            fontSize: '10px',
                            color: supabaseClient ? 'var(--bright-mint)' : '#FF5252',
                            textAlign: 'center',
                            borderTop: '1px solid var(--border)'
                        }}>
                            <i data-lucide={supabaseClient ? "cloud-check" : "cloud-off"} style={{ width: '12px', marginBottom: '4px' }}></i>
                            <br />
                            {supabaseClient ? 'CLOUD ACTIVE' : 'LOCAL MODE'}
                            <br />
                            V. 1.2.0
                        </div>
                    </nav>
                    <main className="content">
                        {renderContent()}
                    </main>
                </React.Fragment>
            );
        };

        const Menu = ({ setActiveTab, supabaseClient }) => {
            const menuItems = [
                { id: 'crm', label: 'CRM Farmacie', icon: 'building-2', desc: 'Gestisci e monitora le farmacie' },
                { id: 'partecipanti', label: 'Partecipanti', icon: 'users', desc: 'Lista iscritti all\'evento' },
                { id: 'sede', label: 'Locale', icon: 'map-pin', desc: 'Dettagli e costi location' },
                { id: 'sponsors', label: 'Sponsor & Partner', icon: 'dollar-sign', desc: 'Budget e contributi' },
                { id: 'settings', label: 'Impostazioni Cloud', icon: 'settings', desc: 'Configurazione Supabase e Backup' },
            ];

            return (
                <div className="fade-in">
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(130px, 1fr))', gap: '8px' }}>
                        {menuItems.map(item => (
                            <div
                                key={item.id}
                                className="card"
                                style={{
                                    display: 'flex',
                                    flexDirection: 'column',
                                    alignItems: 'center',
                                    justifyContent: 'center',
                                    gap: '8px',
                                    cursor: 'pointer',
                                    padding: '14px 10px',
                                    textAlign: 'center',
                                    transition: 'background 0.2s, border-color 0.2s',
                                    border: '1px solid var(--border)',
                                    minHeight: '76px'
                                }}
                                onClick={() => setActiveTab(item.id)}
                                onMouseEnter={(e) => { e.currentTarget.style.background = '#1A2621'; e.currentTarget.style.borderColor = 'rgba(0,230,118,0.3)'; }}
                                onMouseLeave={(e) => { e.currentTarget.style.background = 'var(--card-bg)'; e.currentTarget.style.borderColor = 'var(--border)'; }}
                            >
                                <i data-lucide={item.icon} style={{ color: 'var(--bright-mint)', width: '18px', height: '18px' }}></i>
                                <div style={{ fontWeight: '600', fontSize: '11px', color: 'var(--text-main)', lineHeight: '1.3' }}>{item.label}</div>
                            </div>
                        ))}
                    </div>

                    <div className="card" style={{ marginTop: '32px', textAlign: 'center', background: 'transparent', border: '1px dashed var(--border)' }}>
                        <div style={{
                            fontSize: '11px',
                            color: supabaseClient ? 'var(--bright-mint)' : '#FF5252',
                            display: 'flex',
                            alignItems: 'center',
                            justifyContent: 'center',
                            gap: '8px'
                        }}>
                            <i data-lucide={supabaseClient ? "cloud-check" : "cloud-off"} style={{ width: '14px' }}></i>
                            {supabaseClient ? 'DATABASE SINCRONIZZATO' : 'MODALITÀ LOCALE'}
                        </div>
                        <div style={{ fontSize: '10px', color: 'var(--text-dim)', marginTop: '8px' }}>Versione 1.2.5 • PharmaConnect Manager</div>
                    </div>
                </div>
            );
        };

        const Settings = ({ url, setUrl, loadData, exportToSupabase, supabaseClient }) => {
            const [tempUrl, setTempUrl] = useState(url);
            const isConnected = !!supabaseClient;
            const [confirm, setConfirm] = useState(null);

            return (
                <div className="fade-in" style={{ maxWidth: '600px' }}>
                    {confirm && <ConfirmModal message={confirm.message} onConfirm={confirm.onConfirm} onCancel={() => setConfirm(null)} />}
                    <div className="card">
                        <div className="card-title">Configurazione Supabase</div>

                        <div style={{
                            padding: '8px 12px',
                            borderRadius: '4px',
                            background: isConnected ? 'rgba(0, 230, 118, 0.1)' : 'rgba(255, 82, 82, 0.1)',
                            color: isConnected ? 'var(--bright-mint)' : '#FF5252',
                            fontSize: '11px',
                            fontWeight: 'bold',
                            marginBottom: '16px',
                            display: 'flex',
                            alignItems: 'center',
                            gap: '8px'
                        }}>
                            <div style={{
                                width: '8px',
                                height: '8px',
                                borderRadius: '50%',
                                background: isConnected ? 'var(--bright-mint)' : '#FF5252',
                                boxShadow: isConnected ? '0 0 8px var(--bright-mint)' : 'none'
                            }}></div>
                            {isConnected ? 'SISTEMA COLLEGATO A SUPABASE' : 'SISTEMA NON COLLEGATO'}
                        </div>

                        <div className="input-group">
                            <label>Supabase Anon Key</label>
                            <input
                                type="password"
                                value={tempUrl}
                                onChange={e => setTempUrl(e.target.value)}
                                placeholder="Inserisci la Anon Key..."
                            />
                        </div>

                        <div style={{ display: 'flex', gap: '8px', marginTop: '16px' }}>
                            <button className="btn btn-primary" onClick={() => {
                                setUrl(tempUrl);
                                window.alert("Key aggiornata. L'app tenterà ora la connessione.");
                            }}>Salva Key</button>

                            <button className="btn btn-outline" onClick={() => {
                                if (!isConnected) {
                                    window.alert("Impossibile caricare: Supabase non collegato.");
                                } else {
                                    loadData();
                                }
                            }}>Ricarica dal Cloud</button>
                        </div>

                        <div style={{ marginTop: '24px', borderTop: '1px solid var(--border)', paddingTop: '20px' }}>
                            <div className="card-title" style={{ color: 'var(--bright-mint)' }}>Sincronizzazione Dati</div>
                            <p style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '12px' }}>
                                Usa questi comandi per allineare i dati tra questo computer e il cloud.
                            </p>

                            <button
                                className="btn btn-outline"
                                style={{ width: '100%', borderColor: 'var(--bright-mint)', color: 'var(--bright-mint)', marginBottom: '10px' }}
                                onClick={() => {
                                    if (!isConnected) return;
                                    setConfirm({
                                        message: "Vuoi inviare i dati attuali al Cloud?",
                                        onConfirm: async () => { setConfirm(null); await exportToSupabase(false); }
                                    });
                                }}
                            >
                                <i data-lucide="upload-cloud" style={{ width: '14px', marginRight: '6px' }}></i>
                                Invia dati al Cloud (Sync)
                            </button>

                            <button
                                className="btn btn-outline"
                                style={{ width: '100%', borderColor: '#FF5252', color: '#FF5252' }}
                                onClick={() => {
                                    if (!isConnected) return;
                                    setConfirm({
                                        message: "⚠️ ATTENZIONE: Questo sovrascriverà tutto il database con le 50 farmacie originali. Sei sicuro?",
                                        onConfirm: async () => { setConfirm(null); await exportToSupabase(true); }
                                    });
                                }}
                            >
                                <i data-lucide="refresh-cw" style={{ width: '14px', marginRight: '6px' }}></i>
                                RESET TOTALE (Ripristina 50 Farmacie)
                            </button>
                        </div>
                    </div>

                    <div className="card" style={{ marginTop: '16px' }}>
                        <div className="card-title">Backup Locale</div>
                        <p style={{ fontSize: '11px', color: 'var(--text-dim)', marginBottom: '12px' }}>Le farmacie sono ora su Supabase — esportale direttamente dalla dashboard Supabase → Table Editor → farmacie → Export.</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
